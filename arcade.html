<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Street — Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: '#FDFBF7',
        sage: { DEFAULT: '#4A6741', light: '#6B8A60' },
        gold: { DEFAULT: '#B8926A', light: '#D4B896', pale: '#F0E6D8' },
        fog: { DEFAULT: '#7B8FA1', light: '#A8B8C8' },
        ink: '#2D2926',
        deep: '#1E1D1B',
        warmgray: { DEFAULT: '#6B6560', light: '#9B9590' },
      },
      fontFamily: {
        display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
        body: ['"DM Sans"', 'system-ui', 'sans-serif'],
        accent: ['"Playfair Display"', 'Georgia', 'serif'],
      },
    }
  }
}
</script>
<style>
  body { background: #1E1D1B; -webkit-font-smoothing: antialiased; }
  canvas { display: block; }
  .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .hidden { display: none !important; }
  .glass { background: rgba(255,253,247,0.04); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; }
  .menu-card { background: rgba(255,253,247,0.95); border: 1px solid rgba(0,0,0,0.06); border-radius: 16px; transition: all 0.4s cubic-bezier(0.22,1,0.36,1); }
  .menu-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .menu-card:active { transform: scale(0.97); }
</style>
</head>
<body class="overflow-hidden touch-manipulation select-none min-h-screen relative font-body text-cream">

<!-- ═══ MAIN MENU ═══ -->
<div id="main-menu" class="screen">
  <p class="font-accent italic text-[0.6rem] tracking-[0.35em] text-gold opacity-40 mb-4">ARCADE</p>
  <h1 class="font-display text-[2.2rem] font-light tracking-wide leading-none text-cream/90 mb-1">
    Word <em class="italic font-light text-cream/40">Arcade</em>
  </h1>
  <p class="text-[0.6rem] font-semibold tracking-[0.15em] uppercase text-cream/25 mb-10">Choose your game</p>

  <div class="flex flex-col gap-3 w-full max-w-[300px]">
    <button class="menu-card px-6 py-5 text-left cursor-pointer" onclick="selectGame(0)">
      <span class="font-display italic text-gold text-sm mr-3">ⅰ.</span>
      <span class="text-ink text-sm font-semibold">Space Shooter</span>
      <p class="text-warmgray text-[0.7rem] mt-1 ml-7">Tap the word that matches the definition</p>
    </button>
    <button class="menu-card px-6 py-5 text-left cursor-pointer" onclick="selectGame(1)">
      <span class="font-display italic text-gold text-sm mr-3">ⅱ.</span>
      <span class="text-ink text-sm font-semibold">Word Bomb</span>
      <p class="text-warmgray text-[0.7rem] mt-1 ml-7">Beat the timer — choose wisely</p>
    </button>
    <button class="menu-card px-6 py-5 text-left cursor-pointer" onclick="selectGame(2)">
      <span class="font-display italic text-gold text-sm mr-3">ⅲ.</span>
      <span class="text-ink text-sm font-semibold">Word Runner</span>
      <p class="text-warmgray text-[0.7rem] mt-1 ml-7">Sprint and collect the right words</p>
    </button>
  </div>

  <p class="font-display italic text-[0.7rem] text-gold/20 mt-8">— est. for the curious mind —</p>
</div>

<!-- ═══ LEVEL SELECT ═══ -->
<div id="level-select" class="screen hidden">
  <p class="font-accent italic text-[0.6rem] tracking-[0.35em] text-gold opacity-40 mb-4">SELECT</p>
  <h1 class="font-display text-xl font-light text-cream/90 tracking-wide mb-6">
    Choose <em class="italic font-light text-cream/40">Level</em>
  </h1>
  <div class="flex flex-wrap justify-center gap-2.5 mb-8" id="level-grid"></div>
  <div class="flex gap-3">
    <button class="px-5 py-3 rounded-xl text-sm font-medium text-cream/40 border border-cream/8 hover:border-cream/15 hover:text-cream/70 transition-all" onclick="showMenu()">Back</button>
    <button class="px-7 py-3 rounded-xl text-sm font-semibold bg-cream/90 text-deep hover:bg-cream transition-all shadow-lg" onclick="startGame()">Begin</button>
  </div>
</div>

<!-- ═══ GAME CANVAS ═══ -->
<canvas id="gameCanvas" class="hidden"></canvas>

<!-- ═══ HUD ═══ -->
<div id="hud" class="hidden absolute top-4 left-5 right-5 flex justify-between items-center pointer-events-none z-10">
  <span id="hearts" class="text-[#D4AB9A] tracking-wider text-sm">♥♥♥</span>
  <span id="score-display" class="font-accent italic text-gold font-semibold tracking-wide">0</span>
</div>

<!-- ═══ BOMB UI ═══ -->
<div id="bomb-ui" class="screen hidden"></div>

<!-- ═══ GAME OVER ═══ -->
<div id="game-over" class="screen hidden" style="background:rgba(30,29,27,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);">
  <div class="flex justify-center mb-4">
    <span class="text-gold/20 text-xs tracking-[0.5em]">· · ·</span>
  </div>
  <h1 class="font-display text-2xl font-light text-cream/90 tracking-wide mb-3">
    Game <em class="italic font-light text-cream/40">Over</em>
  </h1>
  <div id="final-score" class="font-display italic text-[2.8rem] font-light text-gold mb-2">0</div>
  <div id="high-score-label" class="text-[0.7rem] font-medium tracking-[0.1em] uppercase text-cream/30 mb-8">Best: 0</div>
  <button class="px-8 py-3.5 rounded-xl text-sm font-semibold bg-cream/90 text-deep hover:bg-cream transition-all shadow-lg mb-3" onclick="startGame()">Play Again</button>
  <button class="px-6 py-3 rounded-xl text-sm font-medium text-cream/40 border border-cream/8 hover:border-cream/15 transition-all" onclick="showMenu()">Menu</button>
</div>

<script>
// ═══ AUDIO ENGINE ═══
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function sfxShoot() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(1000, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
  g.gain.setValueAtTime(0.06, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
}
function sfxCorrect() {
  if (!audioCtx) return;
  [523, 659, 784].forEach((f, i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.08, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
    }, i * 80);
  });
}
function sfxWrong() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=300;
  o.type = 'sawtooth'; o.frequency.value = 120;
  g.gain.setValueAtTime(0.06, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  o.connect(f).connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.35);
}
function sfxBoom() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.3, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
  const s=audioCtx.createBufferSource(); s.buffer=buf;
  const g=audioCtx.createGain(); g.gain.value=0.1;
  const f=audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=500;
  s.connect(f).connect(g).connect(audioCtx.destination); s.start();
}
function sfxJump() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(300, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(650, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.06, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.13);
  o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.13);
}
function sfxCoin() {
  if (!audioCtx) return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.value=988;
  g.gain.setValueAtTime(0.06,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
  o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.12);
  setTimeout(()=>{const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.type='sine';o2.frequency.value=1319;g2.gain.setValueAtTime(0.06,audioCtx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o2.connect(g2).connect(audioCtx.destination);o2.start();o2.stop(audioCtx.currentTime+0.1);},50);
}
function sfxTick() {
  if (!audioCtx) return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.value=800;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.03);
  o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.03);
}

// ═══ WORD DATA ═══
function getAllWords() {
  return [
    typeof LEVEL1_BANK!=='undefined'?LEVEL1_BANK:[],
    typeof LEVEL2_BANK!=='undefined'?LEVEL2_BANK:[],
    typeof LEVEL2A_BANK!=='undefined'?LEVEL2A_BANK:[],
    typeof LEVEL2B_BANK!=='undefined'?LEVEL2B_BANK:[],
    typeof LEVEL2C_BANK!=='undefined'?LEVEL2C_BANK:[],
    typeof LEVEL2D_BANK!=='undefined'?LEVEL2D_BANK:[],
    typeof LEVEL3A_BANK!=='undefined'?LEVEL3A_BANK:[],
    typeof LEVEL3B_BANK!=='undefined'?LEVEL3B_BANK:[],
    typeof LEVEL3C_BANK!=='undefined'?LEVEL3C_BANK:[],
    typeof LEVEL4A_BANK!=='undefined'?LEVEL4A_BANK:[],
    typeof LEVEL4B_BANK!=='undefined'?LEVEL4B_BANK:[],
    typeof LEVEL4C_BANK!=='undefined'?LEVEL4C_BANK:[],
    typeof LEVEL5A_BANK!=='undefined'?LEVEL5A_BANK:[],
    typeof LEVEL5B_BANK!=='undefined'?LEVEL5B_BANK:[],
    typeof LEVEL5C_BANK!=='undefined'?LEVEL5C_BANK:[],
    typeof LEVEL5D_BANK!=='undefined'?LEVEL5D_BANK:[],
  ].flat();
}
function getWordsForLevel(lvl) {
  const all = getAllWords();
  if (lvl === 0) return all;
  return all.filter(w => w.level === lvl);
}
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.random()*i|0;[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function pick(arr, n) { return shuffle([...arr]).slice(0, n); }

// ═══ STATE ═══
let currentGame = 0, selectedLevel = 0;
let lives = 3, score = 0, gameActive = false;
let canvas, ctx, W, H, animId;
let shakeX=0, shakeY=0, shakeDur=0;
const $ = id => document.getElementById(id);
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }

function showMenu() {
  cancelAnimationFrame(animId); gameActive = false;
  hide('gameCanvas'); hide('hud'); hide('game-over'); hide('level-select'); hide('bomb-ui');
  show('main-menu');
  gsap.fromTo('#main-menu', {opacity:0,y:20}, {opacity:1,y:0,duration:0.5,ease:'power2.out'});
}

function selectGame(g) {
  currentGame = g;
  hide('main-menu'); show('level-select');
  gsap.fromTo('#level-select', {opacity:0,y:16}, {opacity:1,y:0,duration:0.4,ease:'power2.out'});
  const grid = $('level-grid');
  grid.innerHTML = '';
  [{l:0,t:'All'},{l:1,t:'Ⅰ'},{l:2,t:'Ⅱ'},{l:3,t:'Ⅲ'},{l:4,t:'Ⅳ'},{l:5,t:'Ⅴ'}].forEach(({l,t}) => {
    const b = document.createElement('button');
    b.className = `px-5 py-2.5 rounded-xl text-sm font-semibold border transition-all cursor-pointer ${l===selectedLevel ? 'border-gold text-gold bg-gold/10' : 'border-cream/8 text-cream/50 hover:border-cream/15'}`;
    b.textContent = t;
    b.onclick = () => { selectedLevel=l; grid.querySelectorAll('button').forEach(x => { x.className = `px-5 py-2.5 rounded-xl text-sm font-semibold border transition-all cursor-pointer border-cream/8 text-cream/50 hover:border-cream/15`; }); b.className = `px-5 py-2.5 rounded-xl text-sm font-semibold border transition-all cursor-pointer border-gold text-gold bg-gold/10`; };
    grid.appendChild(b);
  });
}

function startGame() {
  ensureAudio();
  hide('main-menu'); hide('level-select'); hide('game-over'); hide('bomb-ui');
  lives = 3; score = 0; gameActive = true; updateHUD();
  if (currentGame === 0) startShooter();
  else if (currentGame === 1) startBomb();
  else startRunner();
}

function updateHUD() {
  $('hearts').textContent = '♥'.repeat(lives) + '♡'.repeat(3-lives);
  $('score-display').textContent = score;
}
function loseLife() { lives--; shakeDur=10; updateHUD(); if(lives<=0) endGame(); }
function endGame() {
  gameActive=false; cancelAnimationFrame(animId);
  hide('gameCanvas'); hide('hud'); hide('bomb-ui');
  const key=`arcade_hs_${currentGame}_${selectedLevel}`;
  const hs=Math.max(score, parseInt(localStorage.getItem(key)||'0'));
  localStorage.setItem(key, hs);
  $('final-score').textContent=score;
  $('high-score-label').textContent=`Best: ${hs}`;
  show('game-over');
  gsap.fromTo('#game-over',{opacity:0},{opacity:1,duration:0.5,ease:'power2.out'});
}

function initCanvas() {
  canvas=$('gameCanvas'); canvas.classList.remove('hidden');
  W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
  ctx=canvas.getContext('2d'); show('hud');
}
function applyShake() {
  if(shakeDur>0){shakeX=(Math.random()-0.5)*shakeDur;shakeY=(Math.random()-0.5)*shakeDur;shakeDur-=0.8;}
  else{shakeX=0;shakeY=0;}
}

// ═══ PARTICLES ═══
let particles = [];
function spawnParticles(x,y,color,count=12){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=Math.random()*3+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,size:Math.random()*2+1});}}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.025;if(p.life<=0)particles.splice(i,1);}}
function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=p.life*0.5;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

// ═══ GAME 1: SPACE SHOOTER ═══
let enemies=[], shooterDef='', shooterWord=null, shooterTimer=0, spawnRate=100, fallSpeed=1.1;
let wordPool=[];

function startShooter() {
  initCanvas(); particles=[];
  wordPool=shuffle(getWordsForLevel(selectedLevel));
  if(wordPool.length<4) wordPool=shuffle(getAllWords());
  enemies=[]; shooterTimer=0; spawnRate=100; fallSpeed=1.1;
  nextShooterQuestion();
  canvas.ontouchstart=canvas.onclick=shooterTap;
  shooterLoop();
}
function nextShooterQuestion() {
  if(wordPool.length<4) wordPool=shuffle(getWordsForLevel(selectedLevel)||getAllWords());
  shooterWord=wordPool.pop(); shooterDef=shooterWord.definition;
}
function spawnEnemy() {
  const isCorrect=enemies.filter(e=>e.correct).length===0&&Math.random()<0.4;
  let word;
  if(isCorrect){word=shooterWord.word;}
  else{const pool=getWordsForLevel(selectedLevel)||getAllWords();const others=pool.filter(w=>w.word!==shooterWord.word);word=others[Math.random()*others.length|0]?.word||'test';}
  ctx.font='italic 500 15px "Cormorant Garamond",serif';
  const w=ctx.measureText(word).width+44;
  enemies.push({x:Math.random()*(W-120)+60,y:-40,word,correct:word===shooterWord.word,w:Math.max(w,100),h:40,speed:fallSpeed*(0.7+Math.random()*0.5),phase:Math.random()*Math.PI*2});
}
function shooterTap(e) {
  if(!gameActive) return; ensureAudio();
  const rect=canvas.getBoundingClientRect();
  const tx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const ty=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  for(let i=enemies.length-1;i>=0;i--){
    const en=enemies[i];
    if(tx>en.x-en.w/2&&tx<en.x+en.w/2&&ty>en.y-en.h/2&&ty<en.y+en.h/2){
      if(en.correct){sfxShoot();sfxCorrect();spawnParticles(en.x,en.y,'#D4B896',18);WordStreetAudio.playWord(en.word);enemies.splice(i,1);score+=10;updateHUD();if(score%50===0){fallSpeed+=0.25;spawnRate=Math.max(40,spawnRate-8);}nextShooterQuestion();}
      else{sfxWrong();spawnParticles(en.x,en.y,'#B45A50',8);enemies.splice(i,1);loseLife();}
      return;
    }
  }
}
function shooterLoop() {
  if(!gameActive) return;
  animId=requestAnimationFrame(shooterLoop);
  applyShake(); ctx.save(); ctx.translate(shakeX,shakeY);

  // Background — deep editorial dark
  ctx.fillStyle='#1E1D1B'; ctx.fillRect(0,0,W,H);

  shooterTimer++;
  if(shooterTimer%spawnRate===0) spawnEnemy();
  if(!enemies.some(e=>e.correct)&&shooterTimer%30===0){
    ctx.font='italic 500 15px "Cormorant Garamond",serif';
    const w=ctx.measureText(shooterWord.word).width+44;
    enemies.push({x:Math.random()*(W-120)+60,y:-40,word:shooterWord.word,correct:true,w:Math.max(w,100),h:40,speed:fallSpeed*(0.7+Math.random()*0.5),phase:Math.random()*Math.PI*2});
  }

  const t=Date.now()*0.001;
  for(let i=enemies.length-1;i>=0;i--){
    const en=enemies[i];
    en.y+=en.speed;
    en.x+=Math.sin(t+en.phase)*0.3;
    if(en.y>H+50){if(en.correct){loseLife();nextShooterQuestion();}enemies.splice(i,1);continue;}

    // Word blocks — semi-transparent cream with serif text
    const x1=en.x-en.w/2, y1=en.y-en.h/2;
    ctx.fillStyle = en.correct ? 'rgba(253,251,247,0.08)' : 'rgba(253,251,247,0.03)';
    ctx.beginPath(); ctx.roundRect(x1,y1,en.w,en.h,10); ctx.fill();
    ctx.strokeStyle = en.correct ? 'rgba(184,146,106,0.3)' : 'rgba(253,251,247,0.06)';
    ctx.lineWidth=1; ctx.stroke();

    ctx.fillStyle = en.correct ? '#D4B896' : 'rgba(253,251,247,0.5)';
    ctx.font='italic 500 15px "Cormorant Garamond",serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(en.word, en.x, en.y);
  }

  // Definition bar — glass panel at bottom with gold serif italic
  const barH=68;
  const barGrad=ctx.createLinearGradient(0,H-barH,0,H);
  barGrad.addColorStop(0,'rgba(30,29,27,0)');
  barGrad.addColorStop(0.3,'rgba(30,29,27,0.88)');
  barGrad.addColorStop(1,'rgba(30,29,27,0.95)');
  ctx.fillStyle=barGrad; ctx.fillRect(0,H-barH,W,barH);

  ctx.fillStyle='#B8926A';
  ctx.font='italic 500 14px "Cormorant Garamond",serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const defText=shooterDef.length>55?shooterDef.slice(0,52)+'…':shooterDef;
  ctx.fillText(defText, W/2, H-28);

  updateParticles(); drawParticles();
  ctx.restore();
}

// ═══ GAME 2: WORD BOMB ═══
let bombTimer=0, bombMax=8, bombCorrect=0, bombWord=null, bombOptions=[], bombInterval=null, bombStartTime=0;

function startBomb() {
  hide('gameCanvas'); show('hud'); show('bomb-ui');
  wordPool=shuffle(getWordsForLevel(selectedLevel));
  if(wordPool.length<4) wordPool=shuffle(getAllWords());
  bombMax=8; bombCorrect=0; nextBombRound();
}
function nextBombRound() {
  if(!gameActive) return;
  if(wordPool.length<4) wordPool=shuffle(getWordsForLevel(selectedLevel)||getAllWords());
  bombWord=wordPool.pop();
  const pool=(getWordsForLevel(selectedLevel)||getAllWords()).filter(w=>w.word!==bombWord.word);
  bombOptions=shuffle([bombWord,...pick(pool,3)]);
  bombStartTime=Date.now(); bombTimer=bombMax;
  renderBomb();
  clearInterval(bombInterval); bombInterval=setInterval(bombTick,100);
}
function bombTick() {
  if(!gameActive){clearInterval(bombInterval);return;}
  const elapsed=(Date.now()-bombStartTime)/1000;
  bombTimer=Math.max(0,bombMax-elapsed);
  if(bombTimer<=0){clearInterval(bombInterval);sfxBoom();sfxWrong();loseLife();if(gameActive)nextBombRound();else hide('bomb-ui');}
  else{updateBombTimer();if(bombTimer<3&&Math.random()<0.1)sfxTick();}
}
function renderBomb() {
  const ui=$('bomb-ui');
  const pct=bombTimer/bombMax*100;
  const urgent=bombTimer<3;
  ui.innerHTML=`
    <div class="glass p-8 w-[90%] max-w-[360px] text-center">
      <div class="font-display italic text-2xl text-cream/40 mb-3">※</div>
      <div class="w-full h-[3px] bg-cream/5 rounded-full mb-2 overflow-hidden">
        <div id="bomb-bar" class="h-full rounded-full transition-[width] duration-100" style="width:${pct}%;background:${urgent?'#B45A50':'linear-gradient(90deg,#B8926A,#7B8FA1)'}"></div>
      </div>
      <div id="bomb-time" class="font-accent italic text-sm tracking-wide mb-5" style="color:${urgent?'#B45A50':'rgba(253,251,247,0.35)'}">${bombTimer.toFixed(1)}s</div>
      <div class="font-display italic text-base leading-relaxed p-4 mb-5 rounded-xl bg-cream/[0.03] border border-cream/5 text-cream/90">
        ${bombWord.definition}
      </div>
      <div class="grid grid-cols-2 gap-2.5">
        ${bombOptions.map((w,i)=>`<button onclick="bombAnswer(${i})" class="bg-cream/[0.03] border border-cream/6 text-cream/80 text-sm font-medium px-3 py-4 rounded-xl cursor-pointer hover:bg-cream/[0.07] hover:border-cream/12 transition-all active:scale-95 leading-snug">${w.word}</button>`).join('')}
      </div>
    </div>
  `;
}
function updateBombTimer() {
  const bar=$('bomb-bar'),time=$('bomb-time');
  if(bar)bar.style.width=(bombTimer/bombMax*100)+'%';
  if(time){time.textContent=bombTimer.toFixed(1)+'s';time.style.color=bombTimer<3?'#B45A50':'rgba(253,251,247,0.35)';}
}
function bombAnswer(i) {
  if(!gameActive) return; ensureAudio(); clearInterval(bombInterval);
  if(bombOptions[i].word===bombWord.word){
    sfxCorrect();WordStreetAudio.playWord(bombWord.word);score+=10;bombCorrect++;if(bombCorrect%5===0)bombMax=Math.max(4,bombMax-1);updateHUD();
    $('bomb-ui').innerHTML=`<div class="glass p-8 text-center"><p class="font-display italic text-2xl text-sage">Correct</p><p class="text-cream/20 text-xs mt-2">+10</p></div>`;
    setTimeout(()=>{if(gameActive)nextBombRound();},500);
  } else {
    sfxBoom();sfxWrong();loseLife();
    $('bomb-ui').innerHTML=`<div class="glass p-8 text-center"><p class="font-display italic text-2xl text-[#B45A50]">Wrong</p></div>`;
    setTimeout(()=>{if(gameActive)nextBombRound();else hide('bomb-ui');},700);
  }
}

// ═══ GAME 3: WORD RUNNER ═══
let runner, obstacles, coins, groundY, runnerSpeed, distance, nextObsDist;

function startRunner() {
  initCanvas(); particles=[];
  wordPool=shuffle(getWordsForLevel(selectedLevel));
  if(wordPool.length<4) wordPool=shuffle(getAllWords());
  groundY=H*0.75;
  runner={x:80,y:groundY,vy:0,jumping:false,ducking:false,h:48,w:26};
  obstacles=[]; coins=[]; runnerSpeed=4; distance=0; nextObsDist=200;
  canvas.ontouchstart=canvas.onclick=runnerJump;
  runnerLoop();
}
function runnerJump(e) {
  if(!gameActive) return; ensureAudio();
  const ty=(e.touches?e.touches[0].clientY:e.clientY);
  if(ty>H*0.7&&!runner.jumping){runner.ducking=true;setTimeout(()=>runner.ducking=false,400);return;}
  if(!runner.jumping){runner.vy=-14;runner.jumping=true;sfxJump();}
}
function spawnRunnerObstacle() {
  if(wordPool.length<4) wordPool=shuffle(getWordsForLevel(selectedLevel)||getAllWords());
  const correct=wordPool.pop();
  const pool=(getWordsForLevel(selectedLevel)||getAllWords()).filter(w=>w.word!==correct.word);
  const wrong=pool[Math.random()*pool.length|0];
  const ox=W+50, isHigh=Math.random()>0.5;
  obstacles.push({x:ox,y:isHigh?groundY-80:groundY-40,w:120,h:40,word:wrong.word,passed:false});
  coins.push({x:ox+180,y:groundY-60,word:correct.word,def:correct.definition,collected:false,r:16});
}
function runnerLoop() {
  if(!gameActive) return;
  animId=requestAnimationFrame(runnerLoop);
  applyShake(); ctx.save(); ctx.translate(shakeX,shakeY);

  // Background gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1E1D1B'); grad.addColorStop(1,'#252320');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // Subtle parallax lines
  ctx.strokeStyle='rgba(184,146,106,0.03)'; ctx.lineWidth=0.5;
  for(let i=0;i<6;i++){
    const y=groundY-200+i*30; const offset=(distance*0.2*(i+1))%W;
    ctx.beginPath(); ctx.moveTo(-offset,y); ctx.lineTo(W-offset+W,y); ctx.stroke();
  }

  // Ground
  ctx.fillStyle='#252320'; ctx.fillRect(0,groundY,W,H-groundY);
  ctx.strokeStyle='rgba(184,146,106,0.12)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY); ctx.stroke();

  distance+=runnerSpeed;
  if(distance>nextObsDist){spawnRunnerObstacle();nextObsDist=distance+300+Math.random()*200;}
  if(score%50===0&&score>0) runnerSpeed=Math.min(8,4+score/100);

  runner.vy+=0.8; runner.y+=runner.vy;
  if(runner.y>=groundY){runner.y=groundY;runner.vy=0;runner.jumping=false;}

  // Runner — simple minimal figure
  const rh=runner.ducking?24:runner.h;
  const ry=runner.y-rh;
  ctx.fillStyle='#FDFBF7';
  ctx.beginPath(); ctx.roundRect(runner.x-runner.w/2,ry,runner.w,rh,8); ctx.fill();
  ctx.strokeStyle='rgba(184,146,106,0.2)'; ctx.lineWidth=1; ctx.stroke();
  // Eye
  ctx.fillStyle='#1E1D1B';
  ctx.beginPath(); ctx.arc(runner.x+3,ry+12,2,0,Math.PI*2); ctx.fill();
  // Gold accent stripe
  ctx.fillStyle='rgba(184,146,106,0.3)';
  ctx.fillRect(runner.x-runner.w/2+4,ry+rh*0.6,runner.w-8,2);

  // Obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i]; o.x-=runnerSpeed;
    if(o.x<-150){obstacles.splice(i,1);continue;}
    ctx.fillStyle='rgba(180,90,80,0.1)';
    ctx.beginPath(); ctx.roundRect(o.x-o.w/2,o.y-o.h,o.w,o.h,8); ctx.fill();
    ctx.strokeStyle='rgba(180,90,80,0.2)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.fillStyle='rgba(253,251,247,0.6)';
    ctx.font='italic 500 12px "Cormorant Garamond",serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(o.word.length>12?o.word.slice(0,10)+'…':o.word, o.x, o.y-o.h/2);
    if(!o.passed&&runner.x+runner.w/2>o.x-o.w/2&&runner.x-runner.w/2<o.x+o.w/2){
      if(ry+rh>o.y-o.h&&ry<o.y){o.passed=true;sfxWrong();spawnParticles(runner.x,runner.y-20,'#B45A50',8);loseLife();}
    }
    if(runner.x>o.x+o.w/2) o.passed=true;
  }

  // Coins — gold circles
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i]; c.x-=runnerSpeed;
    if(c.x<-50){coins.splice(i,1);continue;}
    if(c.collected) continue;
    const bob=Math.sin(Date.now()/500+c.x*0.01)*3;
    ctx.fillStyle='#B8926A'; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.arc(c.x,c.y+bob,c.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='#1E1D1B'; ctx.font='600 8px "DM Sans",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(c.word.length>6?c.word.slice(0,5):c.word, c.x, c.y+bob);
    const dx=runner.x-c.x,dy=(ry+rh/2)-(c.y+bob);
    if(Math.sqrt(dx*dx+dy*dy)<c.r+runner.w/2){c.collected=true;sfxCoin();WordStreetAudio.playWord(c.word);spawnParticles(c.x,c.y,'#D4B896',10);score+=5;updateHUD();}
  }

  // Definition hint
  if(coins.length>0){
    const next=coins.find(c=>!c.collected&&c.x>runner.x);
    if(next){
      ctx.fillStyle='rgba(30,29,27,0.75)';
      ctx.beginPath(); ctx.roundRect(W*0.05,46,W*0.9,34,8); ctx.fill();
      ctx.fillStyle='#B8926A';
      ctx.font='italic 500 12px "Cormorant Garamond",serif'; ctx.textAlign='center';
      ctx.fillText(next.def.slice(0,55), W/2, 66);
    }
  }

  updateParticles(); drawParticles();
  ctx.restore();
}
