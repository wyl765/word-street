<!DOCTYPE html>
<html lang="en">

<title>Word Street — Party Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: '#FDFBF7',
        sage: { DEFAULT: '#4A6741', light: '#6B8A60', pale: '#E8F0E6' },
        gold: { DEFAULT: '#B8926A', light: '#D4B896', pale: '#F0E6D8' },
        fog: { DEFAULT: '#7B8FA1', light: '#A8B8C8', pale: '#E8EDF2' },
        ink: '#2D2926',
        warmgray: { DEFAULT: '#6B6560', light: '#9B9590' },
        blush: { DEFAULT: '#D4AB9A', light: '#E8D5CC' },
      },
      fontFamily: {
        display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
        body: ['"DM Sans"', 'system-ui', 'sans-serif'],

}

  html, body { width: 100%; height: 100%; overflow: hidden; background: #FDFBF7; touch-action: none; margin: 0; padding: 0; }
  canvas { display: block; width: 100%; height: 100%; }
</style>

<body>
<canvas id="c"></canvas>
<script src="words-level1.js"></script>
<script src="words-level2.js"></script>
<script src="words-level2a.js"></script>
<script src="words-level2b.js"></script>
<script src="words-level2c.js"></script>
<script src="words-level2d.js"></script>
<script src="words-level3a.js"></script>
<script src="words-level3b.js"></script>
<script src="words-level3c.js"></script>
<script src="words-level4a.js"></script>
<script src="words-level4b.js"></script>
<script src="words-level4c.js"></script>
<script src="words-level5a.js"></script>
<script src="words-level5b.js"></script>
<script src="words-level5c.js"></script>
<script src="words-level5d.js"></script>
<script>
'use strict';

// ═══ PALETTE ═══
const PAL = {
  cream: '#FDFBF7',
  white: '#FFFFFF',
  ink: '#2D2926',
  sage: '#4A6741',
  sageLight: '#6B8A60',
  sagePale: '#E8F0E6',
  gold: '#B8926A',
  goldLight: '#D4B896',
  goldPale: '#F0E6D8',
  fog: '#7B8FA1',
  fogLight: '#A8B8C8',
  fogPale: '#E8EDF2',
  blush: '#D4AB9A',
  blushLight: '#E8D5CC',
  warmgray: '#6B6560',
  warmgrayLight: '#9B9590',
  danger: '#B45A50',
  dangerLight: '#D49B94',
};

// Round palettes — each a different soft gradient
const ROUND_PALETTES = [
  { bg1: '#FDFBF7', bg2: '#E8F0E6', ground: '#4A6741', accent: '#6B8A60', name: 'Green Meadow' },
  { bg1: '#FDFBF7', bg2: '#F2E3DE', ground: '#B08A6A', accent: '#D4B896', name: 'Blush Garden' },
  { bg1: '#FDFBF7', bg2: '#E8EDF2', ground: '#7B8FA1', accent: '#A8B8C8', name: 'Twilight Walk' },
  { bg1: '#FDFBF7', bg2: '#E0EBF0', ground: '#5A8A94', accent: '#7BABB8', name: 'Still Water' },
  { bg1: '#FDFBF7', bg2: '#EDE6E0', ground: '#9B7A60', accent: '#B8926A', name: 'Terra Path' },
  { bg1: '#FDFBF7', bg2: '#E8E2F0', ground: '#7A6A90', accent: '#9B88B0', name: 'Grand Finale' },
];

// ═══ WORD DATA ═══
const allWords = [];
const levelWords = { 1:[], 2:[], 3:[], 4:[], 5:[] };
function collectWords() {
  [
    typeof LEVEL1_BANK!=='undefined'?LEVEL1_BANK:[],
    typeof LEVEL2_BANK!=='undefined'?LEVEL2_BANK:[],
    typeof LEVEL2A_BANK!=='undefined'?LEVEL2A_BANK:[],
    typeof LEVEL2B_BANK!=='undefined'?LEVEL2B_BANK:[],
    typeof LEVEL2C_BANK!=='undefined'?LEVEL2C_BANK:[],
    typeof LEVEL2D_BANK!=='undefined'?LEVEL2D_BANK:[],
    typeof LEVEL3A_BANK!=='undefined'?LEVEL3A_BANK:[],
    typeof LEVEL3B_BANK!=='undefined'?LEVEL3B_BANK:[],
    typeof LEVEL3C_BANK!=='undefined'?LEVEL3C_BANK:[],
    typeof LEVEL4A_BANK!=='undefined'?LEVEL4A_BANK:[],
    typeof LEVEL4B_BANK!=='undefined'?LEVEL4B_BANK:[],
    typeof LEVEL4C_BANK!=='undefined'?LEVEL4C_BANK:[],
    typeof LEVEL5A_BANK!=='undefined'?LEVEL5A_BANK:[],
    typeof LEVEL5B_BANK!=='undefined'?LEVEL5B_BANK:[],
    typeof LEVEL5C_BANK!=='undefined'?LEVEL5C_BANK:[],
    typeof LEVEL5D_BANK!=='undefined'?LEVEL5D_BANK:[],
  ].forEach(b => b.forEach(w => {
    allWords.push(w);
    const lv = Math.min(5, Math.max(1, w.level || 1));
    levelWords[lv].push(w);
  }));
}
collectWords();

// ═══ CANVAS ═══
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale;
function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  scale = Math.min(W, H) / 800;
}
resize();
window.addEventListener('resize', resize);

// ═══ AUDIO ═══
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(freq, dur, type='sine', vol=0.12) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxJump() { playSound(500,0.12,'sine',0.1); playSound(700,0.08,'sine',0.07); }
function sfxCorrect() { playSound(523,0.1,'sine',0.1); setTimeout(()=>playSound(659,0.1,'sine',0.08),80); setTimeout(()=>playSound(784,0.15,'sine',0.08),160); }
function sfxWrong() { playSound(130,0.3,'sawtooth',0.06); }
function sfxStar() { playSound(1200,0.12,'sine',0.12); }
function sfxBoing() { playSound(300,0.15,'sine',0.06); }

// ═══ PARTICLES ═══
let particles = [];
function spawnConfetti(x,y,count=25) {
  const colors=[PAL.goldLight,PAL.sageLight,PAL.fogPale,PAL.blushLight,PAL.goldPale,PAL.dangerLight];
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*9,vy:-Math.random()*7-2,size:Math.random()*3+1.5,color:colors[Math.random()*colors.length|0],life:1,decay:0.015+Math.random()*0.01});
  }
}
function spawnStars(x,y) {
  for(let i=0;i<5;i++){particles.push({x,y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3-1.5,size:Math.random()*4+2,color:PAL.goldLight,life:1,decay:0.02,star:true});}
}
function updateParticles() {
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
}
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha=p.life*0.6; ctx.fillStyle=p.color;
    if(p.star){drawStarShape(p.x,p.y,p.size);}
    else{ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  });
}
function drawStarShape(x,y,r) {
  ctx.beginPath();
  for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2;ctx[i===0?'moveTo':'lineTo'](x+r*Math.cos(a),y+r*Math.sin(a));}
  ctx.closePath(); ctx.fill();
}

// ═══ GAME STATE ═══
const STATE={MENU:0,PLAYING:1,GAMEOVER:2,WIN:3};
let state=STATE.MENU;
let character={x:0,y:0,vy:0,grounded:false,skin:0,wobble:0,sparkle:0};
let camera={x:0};
let lives=3, score=0, combo=0, gatesPassed=0;
let currentRound=0;
let gates=[], platforms=[], stars=[], courseLength=0;
let currentGate=null;
let highScores=JSON.parse(localStorage.getItem('eggPartyHigh')||'{}');
let selectedSkin=0;
let speedBoost=0;

const GRAVITY=0.6, JUMP_FORCE=-14, GROUND_Y_RATIO=0.75;
const CHAR_R=22, PLATFORM_H=18, WALK_SPEED=3;

// ═══ LEVEL GENERATION ═══
function getWordsForRound(r){if(r===5)return allWords; const lv=r+1; return levelWords[lv].length>0?levelWords[lv]:allWords;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function generateCourse(round) {
  gates=[];platforms=[];stars=[];
  const words=getWordsForRound(round);
  const shuffled=shuffle(words);
  const gateWords=shuffled.slice(0,5);
  courseLength=5000;
  const groundY=H*GROUND_Y_RATIO;

  for(let i=0;i<5;i++){
    const gx=800+i*900;
    const gateWord=gateWords[i];
    const wrongs=shuffle(words.filter(w=>w.word!==gateWord.word)).slice(0,2);
    const choices=shuffle([gateWord,...wrongs]);
    const correctIdx=choices.indexOf(gateWord);
    gates.push({x:gx,word:gateWord,choices,correctIdx,passed:false});

    for(let c=0;c<3;c++){
      platforms.push({
        x:gx+(c-1)*180,
        y:groundY-140-c%2*40,
        w:150,h:PLATFORM_H,
        label:choices[c].word,
        gateIdx:i,choiceIdx:c,
        broken:false
      });
    }
  }
  for(let i=0;i<20;i++){
    stars.push({x:300+Math.random()*(courseLength-400),y:groundY-180-Math.random()*150,collected:false});
  }
}

function startRound(round) {
  currentRound=round; state=STATE.PLAYING;
  lives=3;score=0;combo=0;gatesPassed=0;speedBoost=0;
  character.x=100; character.y=H*GROUND_Y_RATIO-CHAR_R;
  character.vy=0;character.grounded=true;character.wobble=0;character.sparkle=0;
  camera.x=0;currentGate=null;particles=[];
  generateCourse(round);
}

// ═══ INPUT ═══
function doJump() {
  ensureAudio();
  if(state===STATE.MENU) return;
  if(state===STATE.PLAYING&&character.grounded){character.vy=JUMP_FORCE;character.grounded=false;sfxJump();}
}
canvas.addEventListener('pointerdown', e=>{e.preventDefault();doJump();});
document.addEventListener('keydown', e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}});

canvas.addEventListener('click', e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*devicePixelRatio;
  const my=(e.clientY-rect.top)*devicePixelRatio;

  if(state===STATE.MENU){
    // Skin selection
    for(let i=0;i<3;i++){
      const bx=W/2-120*scale+i*120*scale, by=H*0.46;
      if(mx>bx-30*scale&&mx<bx+30*scale&&my>by-30*scale&&my<by+30*scale){selectedSkin=i;character.skin=i;return;}
    }
    // Round selection
    for(let i=0;i<6;i++){
      const cols=3, gapX=170*scale, gapY=62*scale;
      const startX=W/2-gapX, startY=H*0.60;
      const bx=startX+(i%cols)*gapX, by=startY+Math.floor(i/cols)*gapY;
      if(mx>bx-70*scale&&mx<bx+70*scale&&my>by-22*scale&&my<by+22*scale){startRound(i);return;}
    }
  }
  if(state===STATE.GAMEOVER||state===STATE.WIN){
    const bx=W/2, by=H*0.7;
    if(mx>bx-100*scale&&mx<bx+100*scale&&my>by-28*scale&&my<by+28*scale){state=STATE.MENU;return;}
  }
});

// ═══ UPDATE ═══
function update() {
  if(state!==STATE.PLAYING) return;
  const groundY=H*GROUND_Y_RATIO;
  const speed=WALK_SPEED+(speedBoost>0?2:0);
  if(speedBoost>0)speedBoost--;

  character.x+=speed;
  camera.x=character.x-W*0.3;
  character.vy+=GRAVITY;
  character.y+=character.vy;

  if(character.y>=groundY-CHAR_R){
    character.y=groundY-CHAR_R;
    if(character.vy>2){character.wobble=8;sfxBoing();}
    character.vy=0;character.grounded=true;
  }

  platforms.forEach(p=>{
    if(p.broken) return;
    const px=p.x-camera.x, py=p.y;
    if(character.vy>0&&
       character.x-camera.x>px-p.w/2&&character.x-camera.x<px+p.w/2&&
       character.y+CHAR_R>py&&character.y+CHAR_R<py+p.h+character.vy+5){
      character.y=py-CHAR_R;character.vy=0;character.grounded=true;character.wobble=5;

      if(p.gateIdx!==undefined){
        const gate=gates[p.gateIdx];
        if(!gate.passed){
          if(p.choiceIdx===gate.correctIdx){
            gate.passed=true;gatesPassed++;combo++;score+=100*combo;
            sfxCorrect();spawnConfetti(character.x,character.y,30);
            if(combo>=3){speedBoost=120;character.sparkle=120;}
            if(gatesPassed>=5){
              state=STATE.WIN;
              const key='round'+currentRound;
              if(!highScores[key]||score>highScores[key]){highScores[key]=score;localStorage.setItem('eggPartyHigh',JSON.stringify(highScores));}
            }
          } else {
            p.broken=true;combo=0;lives--;sfxWrong();spawnConfetti(p.x,p.y,6);
            if(lives<=0){state=STATE.GAMEOVER;}
            else{character.x=gate.x-300+camera.x;character.y=groundY-CHAR_R;character.vy=0;character.grounded=true;}
          }
        }
      }
    }
  });

  stars.forEach(s=>{
    if(s.collected) return;
    const dx=(character.x-camera.x)-(s.x-camera.x), dy=character.y-s.y;
    if(Math.abs(dx)<30&&Math.abs(dy)<30){s.collected=true;score+=50;sfxStar();spawnStars(s.x-camera.x,s.y);}
  });

  if(character.wobble>0)character.wobble*=0.85;
  if(character.sparkle>0)character.sparkle--;

  currentGate=null;
  gates.forEach(g=>{if(!g.passed&&Math.abs(character.x-g.x)<500)currentGate=g;});
  updateParticles();
}

// ═══ DRAW ═══
function drawBackground() {
  const pal=state===STATE.MENU?ROUND_PALETTES[5]:ROUND_PALETTES[currentRound];
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,pal.bg1); grad.addColorStop(1,pal.bg2);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
}

function drawGround() {
  const groundY=H*GROUND_Y_RATIO;
  const pal=state===STATE.MENU?ROUND_PALETTES[5]:ROUND_PALETTES[currentRound];
  ctx.fillStyle=pal.ground;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(0,groundY,W,H-groundY,[12,12,0,0]);
  else ctx.rect(0,groundY,W,H-groundY);
  ctx.fill();
}

function drawCharacter(x, y) {
  const wobbleY=Math.sin(character.wobble)*character.wobble*0.4;
  const squish=1+character.wobble*0.008;
  ctx.save();
  ctx.translate(x,y+wobbleY);
  ctx.scale(1/squish,squish);

  // Sparkle trail
  if(character.sparkle>0){
    ctx.globalAlpha=character.sparkle/120*0.25;
    ctx.fillStyle=PAL.goldLight;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-16-i*10+Math.random()*3,Math.random()*12-6,1.5+Math.random()*1.5,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }

  // Body — cream rounded-rect with gold stroke
  const headW=CHAR_R*0.8, bodyH=CHAR_R*1.6;
  ctx.fillStyle=PAL.cream;
  ctx.strokeStyle='rgba(184,146,106,0.3)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(-headW,-CHAR_R-headW*0.2,headW*2,bodyH,10);
  else ctx.rect(-headW,-CHAR_R-headW*0.2,headW*2,bodyH);
  ctx.fill(); ctx.stroke();

  // Skin patterns
  if(character.skin===1){
    ctx.fillStyle=PAL.blush; ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.arc(-4,-CHAR_R*0.3,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6,-CHAR_R*0.3+3,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(1,-CHAR_R*0.3-8,1.8,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  } else if(character.skin===2){
    ctx.strokeStyle=PAL.fogLight;ctx.lineWidth=1.2;ctx.globalAlpha=0.35;
    ctx.beginPath();ctx.arc(0,-CHAR_R*0.3,12,-0.4,0.4);ctx.stroke();
    ctx.strokeStyle=PAL.goldLight;
    ctx.beginPath();ctx.arc(0,-CHAR_R*0.3,8,-0.4,0.4);ctx.stroke();
    ctx.globalAlpha=1;
  }

  // Gold accent stripe
  ctx.fillStyle=PAL.gold; ctx.globalAlpha=0.2;
  ctx.fillRect(-headW+3,-CHAR_R+bodyH*0.55,headW*2-6,2);
  ctx.globalAlpha=1;

  // Eyes
  ctx.fillStyle=PAL.ink;
  ctx.beginPath();ctx.arc(-5,-CHAR_R*0.3-2,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-CHAR_R*0.3-2,2.2,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-3.5,-CHAR_R*0.3-3.5,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6.5,-CHAR_R*0.3-3.5,1,0,Math.PI*2);ctx.fill();

  // Subtle blush
  ctx.fillStyle='rgba(212,171,154,0.25)';
  ctx.beginPath();ctx.arc(-10,-CHAR_R*0.3+4,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(10,-CHAR_R*0.3+4,3,0,Math.PI*2);ctx.fill();

  // Legs
  const legAnim=Math.sin(Date.now()/100)*3;
  ctx.fillStyle=PAL.warmgrayLight;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(-6,CHAR_R*0.5+legAnim,5,7,3);else ctx.rect(-6,CHAR_R*0.5+legAnim,5,7);ctx.fill();
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(2,CHAR_R*0.5-legAnim,5,7,3);else ctx.rect(2,CHAR_R*0.5-legAnim,5,7);ctx.fill();

  ctx.restore();
}

function drawPlatforms() {
  platforms.forEach(p=>{
    if(p.broken) return;
    const px=p.x-camera.x, py=p.y;
    if(px<-200||px>W+200) return;

    // Platform — muted color cards
    const gateIdx = p.gateIdx !== undefined ? p.gateIdx : 0;
    const platColors = [PAL.fogPale, PAL.sagePale, PAL.blushLight, PAL.goldPale, PAL.fogPale];
    ctx.fillStyle = platColors[gateIdx % platColors.length];
    ctx.shadowColor='rgba(0,0,0,0.06)'; ctx.shadowBlur=6; ctx.shadowOffsetY=2;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(px-p.w/2,py,p.w,p.h,8);
    else ctx.rect(px-p.w/2,py,p.w,p.h);
    ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1; ctx.stroke();

    // Label
    ctx.fillStyle=PAL.ink;
    ctx.font=`500 ${12*scale}px "DM Sans",sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(p.label, px, py-7*scale);
  });
}

function drawStarsItems() {
  stars.forEach(s=>{
    if(s.collected) return;
    const sx=s.x-camera.x, sy=s.y;
    if(sx<-50||sx>W+50) return;
    const bob=Math.sin(Date.now()/500+s.x)*3;
    // Gold star with white shine
    ctx.fillStyle=PAL.goldLight; ctx.globalAlpha=0.8;
    drawStarShape(sx,sy+bob,8*scale);
    ctx.fillStyle='#fff'; ctx.globalAlpha=0.35;
    drawStarShape(sx,sy+bob,4*scale);
    ctx.globalAlpha=1;
  });
}

function drawHUD() {
  // Hearts
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<lives?PAL.danger:'rgba(0,0,0,0.08)';
    ctx.font=`${18*scale}px sans-serif`; ctx.textAlign='left';
    ctx.fillText('♥',22*scale+i*26*scale,32*scale);
  }
  // Score
  ctx.fillStyle=PAL.ink;
  ctx.font=`italic 600 ${15*scale}px "Playfair Display",serif`;
  ctx.textAlign='right';
  ctx.fillText(score,W-22*scale,30*scale);
  ctx.textAlign='left';
  // Combo
  if(combo>=2){
    ctx.fillStyle=PAL.gold;
    ctx.font=`italic 500 ${13*scale}px "Cormorant Garamond",serif`;
    ctx.textAlign='center';
    ctx.fillText(`${combo}× combo`,W/2,30*scale);
    ctx.textAlign='left';
  }
  // Progress
  ctx.fillStyle=PAL.warmgrayLight;
  ctx.font=`500 ${10*scale}px "DM Sans",sans-serif`;
  ctx.fillText(`${gatesPassed}/5`,22*scale,52*scale);
}

function drawGateHint() {
  if(!currentGate) return;
  // Frosted white panel with serif italic
  const panelW=W*0.84, panelH=60*scale;
  const panelX=W*0.08, panelY=H*0.07;

  ctx.fillStyle='rgba(253,251,247,0.92)';
  ctx.shadowColor='rgba(0,0,0,0.05)'; ctx.shadowBlur=12; ctx.shadowOffsetY=3;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(panelX,panelY,panelW,panelH,12);
  else ctx.rect(panelX,panelY,panelW,panelH);
  ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;ctx.stroke();

  ctx.fillStyle=PAL.ink;
  ctx.font=`italic 500 ${13*scale}px "Cormorant Garamond",serif`;
  ctx.textAlign='center';
  ctx.fillText(currentGate.word.definition,W/2,panelY+24*scale,panelW*0.85);

  ctx.font=`500 ${9*scale}px "DM Sans",sans-serif`;
  ctx.fillStyle=PAL.warmgrayLight;
  ctx.fillText('Jump to the correct word',W/2,panelY+44*scale);
  ctx.textAlign='left';
}

function drawMenu() {
  ctx.fillStyle=PAL.ink;
  ctx.font=`300 ${32*scale}px "Cormorant Garamond",serif`;
  ctx.textAlign='center';
  ctx.fillText('Vocab Party',W/2,H*0.12);

  ctx.font=`italic 500 ${10*scale}px "Playfair Display",serif`;
  ctx.fillStyle=PAL.gold; ctx.globalAlpha=0.5;
  ctx.fillText('A Word Street Adventure',W/2,H*0.18);
  ctx.globalAlpha=1;

  // Divider
  ctx.fillStyle=PAL.gold; ctx.globalAlpha=0.2;
  ctx.font=`${8*scale}px sans-serif`;
  ctx.fillText('· · ·',W/2,H*0.22);
  ctx.globalAlpha=1;

  // Character preview
  drawCharacter(W/2,H*0.30);

  // Skin selection
  ctx.fillStyle=PAL.warmgrayLight;
  ctx.font=`500 ${10*scale}px "DM Sans",sans-serif`;
  ctx.fillText('Choose your character',W/2,H*0.40);

  const skinNames=['Classic','Dotted','Striped'];
  for(let i=0;i<3;i++){
    const bx=W/2-120*scale+i*120*scale, by=H*0.46;
    ctx.fillStyle=i===selectedSkin?'rgba(184,146,106,0.08)':'rgba(0,0,0,0.02)';
    ctx.beginPath();ctx.arc(bx,by,24*scale,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=i===selectedSkin?PAL.gold:'rgba(0,0,0,0.06)';
    ctx.lineWidth=i===selectedSkin?1.5:0.8;ctx.stroke();
    ctx.fillStyle=PAL.ink;
    ctx.font=`500 ${9*scale}px "DM Sans",sans-serif`;
    ctx.fillText(skinNames[i],bx,by+40*scale);
  }

  // Round buttons
  ctx.font=`600 ${10*scale}px "DM Sans",sans-serif`;
  for(let i=0;i<6;i++){
    const cols=3, gapX=160*scale, gapY=58*scale;
    const startX=W/2-gapX, startY=H*0.60;
    const bx=startX+(i%cols)*gapX, by=startY+Math.floor(i/cols)*gapY;
    const pal=ROUND_PALETTES[i];

    ctx.shadowColor='rgba(0,0,0,0.06)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
    ctx.fillStyle=pal.ground;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(bx-60*scale,by-18*scale,120*scale,36*scale,10);
    else ctx.rect(bx-60*scale,by-18*scale,120*scale,36*scale);
    ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;

    ctx.fillStyle='#fff';
    ctx.fillText(pal.name,bx,by+4*scale);
  }

  // Hint
  ctx.fillStyle=PAL.warmgrayLight;
  ctx.font=`italic 500 ${10*scale}px "Cormorant Garamond",serif`;
  ctx.globalAlpha=0.5;
  ctx.fillText('Tap to jump · Collect stars · Land on the right word',W/2,H*0.90);
  ctx.globalAlpha=1;
  ctx.textAlign='left';
}

function drawEndScreen(won) {
  // Semi-transparent cream overlay
  ctx.fillStyle='rgba(253,251,247,0.92)';
  ctx.fillRect(0,0,W,H);

  // Divider
  ctx.fillStyle=PAL.gold; ctx.globalAlpha=0.2;
  ctx.font=`${8*scale}px sans-serif`; ctx.textAlign='center';
  ctx.fillText('· · ·',W/2,H*0.22);
  ctx.globalAlpha=1;

  ctx.fillStyle=PAL.ink;
  ctx.font=`300 ${28*scale}px "Cormorant Garamond",serif`;
  ctx.textAlign='center';
  ctx.fillText(won?'Course Complete':'Game Over',W/2,H*0.30);

  ctx.font=`italic 500 ${13*scale}px "Cormorant Garamond",serif`;
  ctx.fillStyle=PAL.warmgrayLight;
  ctx.fillText(won?'Beautifully played':'Better luck next time',W/2,H*0.37);

  // Score
  ctx.font=`italic 600 ${20*scale}px "Playfair Display",serif`;
  ctx.fillStyle=PAL.gold;
  ctx.fillText(score,W/2,H*0.47);

  ctx.font=`500 ${10*scale}px "DM Sans",sans-serif`;
  ctx.fillStyle=PAL.warmgrayLight;
  ctx.fillText('Score',W/2,H*0.51);

  if(won){
    ctx.fillStyle=PAL.ink;
    ctx.font=`500 ${12*scale}px "DM Sans",sans-serif`;
    ctx.fillText(`Gates: ${gatesPassed}/5`,W/2,H*0.57);
    const bounce=Math.abs(Math.sin(Date.now()/300))*8;
    drawCharacter(W/2,H*0.64-bounce);
  }

  // Play Again button
  ctx.shadowColor='rgba(0,0,0,0.06)';ctx.shadowBlur=10;ctx.shadowOffsetY=2;
  ctx.fillStyle=PAL.sage;
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(W/2-80*scale,H*0.7-20*scale,160*scale,40*scale,12);
  else ctx.rect(W/2-80*scale,H*0.7-20*scale,160*scale,40*scale);
  ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  ctx.fillStyle='#fff';
  ctx.font=`600 ${12*scale}px "DM Sans",sans-serif`;
  ctx.fillText('Play Again',W/2,H*0.7+4*scale);
  ctx.textAlign='left';
}

// ═══ MAIN LOOP ═══
function frame() {
  update();
  drawBackground();
  drawGround();

  if(state===STATE.MENU){drawMenu();}
  else if(state===STATE.PLAYING){
    drawPlatforms();drawStarsItems();
    drawCharacter(character.x-camera.x,character.y);
    drawParticles();drawHUD();drawGateHint();
  }
  else if(state===STATE.GAMEOVER){drawEndScreen(false);drawParticles();}
  else if(state===STATE.WIN){drawEndScreen(true);drawParticles();}

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
