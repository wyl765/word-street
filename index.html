<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Street</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: '#FDFBF7',
        sage: { DEFAULT: '#4A6741', light: '#6B8A60', pale: '#E8F0E6' },
        gold: { DEFAULT: '#B8926A', light: '#D4B896', pale: '#F0E6D8' },
        fog: { DEFAULT: '#7B8FA1', light: '#A8B8C8', pale: '#E8EDF2' },
        ink: '#2D2926',
        warmgray: { DEFAULT: '#6B6560', light: '#9B9590' },
      },
      fontFamily: {
        display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
        body: ['"DM Sans"', 'system-ui', 'sans-serif'],
        accent: ['"Playfair Display"', 'Georgia', 'serif'],
      },
      borderColor: { subtle: 'rgba(0,0,0,0.06)' },
    }
  }
}
</script>
<style>
  body { background: #FDFBF7; -webkit-font-smoothing: antialiased; }
  .option-btn { transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
  .option-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.correct { background: rgba(74,103,65,0.06); border-color: #4A6741; color: #4A6741; }
  .option-btn.wrong { background: rgba(180,90,80,0.05); border-color: #B45A50; color: #B45A50; }
  .option-btn.disabled { pointer-events: none; }
  .option-btn.disabled:not(.correct):not(.wrong) { opacity: 0.2; transform: scale(0.97); }
  .progress-fill { transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
  .screen { opacity: 0; }
  .heart { display: inline-block; font-size: 1.4rem; margin: 0 2px; transition: transform 0.3s; }
  .heart.lost { filter: grayscale(1); opacity: 0.25; }
  .float-up {
    position: absolute; pointer-events: none; font-weight: 700; font-size: 1.1rem;
    z-index: 50; white-space: nowrap;
  }
  .particle {
    position: absolute; pointer-events: none; border-radius: 50%; z-index: 40;
  }
  .combo-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    pointer-events: none; z-index: 100; font-size: 2rem; font-weight: 800;
    text-shadow: 0 2px 12px rgba(184,146,106,0.4);
  }
  .speed-badge {
    position: absolute; pointer-events: none; z-index: 50; font-weight: 700; font-size: 0.85rem;
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 font-body text-ink">

<div id="app" class="w-full max-w-[440px] min-h-[560px] flex flex-col items-center"></div>

<script src="pronunciation.js"></script>
<script src="words-level1.js"></script>
<script src="words-level2.js"></script>
<script src="words-level2a.js"></script>
<script src="words-level2b.js"></script>
<script src="words-level2c.js"></script>
<script src="words-level2d.js"></script>
<script src="words-level3a.js"></script>
<script src="words-level3b.js"></script>
<script src="words-level3c.js"></script>
<script src="words-level4a.js"></script>
<script src="words-level4b.js"></script>
<script src="words-level4c.js"></script>
<script src="words-level5a.js"></script>
<script src="words-level5b.js"></script>
<script src="words-level5c.js"></script>
<script src="words-level5d.js"></script>
<script>
(function() {
  'use strict';
  const app = document.getElementById('app');
  const WAVE_SIZE = 10;
  const SPEED_THRESHOLD = 3000; // 3 seconds for speed bonus
  const SPEED_BONUS = 50;
  const BASE_POINTS = 100;

  /* ═══ WORD BANKS ═══ */
  const allBanks = {
    1: [...(typeof LEVEL1_BANK!=='undefined'?LEVEL1_BANK:[])],
    2: [
      ...(typeof LEVEL2_BANK!=='undefined'?LEVEL2_BANK:[]),
      ...(typeof LEVEL2A_BANK!=='undefined'?LEVEL2A_BANK:[]),
      ...(typeof LEVEL2B_BANK!=='undefined'?LEVEL2B_BANK:[]),
      ...(typeof LEVEL2C_BANK!=='undefined'?LEVEL2C_BANK:[]),
      ...(typeof LEVEL2D_BANK!=='undefined'?LEVEL2D_BANK:[]),
    ],
    3: [
      ...(typeof LEVEL3A_BANK!=='undefined'?LEVEL3A_BANK:[]),
      ...(typeof LEVEL3B_BANK!=='undefined'?LEVEL3B_BANK:[]),
      ...(typeof LEVEL3C_BANK!=='undefined'?LEVEL3C_BANK:[]),
    ],
    4: [
      ...(typeof LEVEL4A_BANK!=='undefined'?LEVEL4A_BANK:[]),
      ...(typeof LEVEL4B_BANK!=='undefined'?LEVEL4B_BANK:[]),
      ...(typeof LEVEL4C_BANK!=='undefined'?LEVEL4C_BANK:[]),
    ],
    5: [
      ...(typeof LEVEL5A_BANK!=='undefined'?LEVEL5A_BANK:[]),
      ...(typeof LEVEL5B_BANK!=='undefined'?LEVEL5B_BANK:[]),
      ...(typeof LEVEL5C_BANK!=='undefined'?LEVEL5C_BANK:[]),
      ...(typeof LEVEL5D_BANK!=='undefined'?LEVEL5D_BANK:[]),
    ],
  };

  function getPool(level) {
    if (level === 'all') return Object.values(allBanks).flat();
    return allBanks[level] || [];
  }
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function pick(arr, n, exclude) {
    return shuffle(arr.filter(w => w !== exclude)).slice(0, n);
  }

  /* ═══ HIGH SCORE ═══ */
  function getHighScore() {
    return parseInt(localStorage.getItem('wordstreet_highscore') || '0', 10);
  }
  function setHighScore(s) {
    if (s > getHighScore()) localStorage.setItem('wordstreet_highscore', String(s));
  }

  /* ═══ STATE ═══ */
  let state = {
    level: '1', mode: 'definition',
    lives: 3, score: 0, combo: 0, bestCombo: 0,
    wave: 1, waveQ: 0, // waveQ = question index within current wave (0-9)
    pool: [], questionStartTime: 0,
  };

  function getMultiplier() {
    if (state.combo >= 10) return 5;
    if (state.combo >= 5) return 3;
    if (state.combo >= 3) return 2;
    return 1;
  }

  function generateWaveQuestions() {
    const pool = state.pool;
    if (pool.length < 4) return [];
    const selected = shuffle(pool).slice(0, WAVE_SIZE);
    return selected.map(word => ({
      word,
      distractors: pick(pool, 3, word),
    }));
  }

  /* ═══ PARTICLES ═══ */
  function burstParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = 4 + Math.random() * 6;
      el.style.cssText = `width:${size}px;height:${size}px;background:${color};left:${x}px;top:${y}px;`;
      document.body.appendChild(el);
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 40 + Math.random() * 60;
      gsap.to(el, {
        x: Math.cos(angle) * dist, y: Math.sin(angle) * dist,
        opacity: 0, scale: 0, duration: 0.6 + Math.random() * 0.3,
        ease: 'power2.out',
        onComplete: () => el.remove(),
      });
    }
  }

  function floatText(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'float-up';
    el.style.cssText = `left:${x}px;top:${y}px;color:${color};`;
    el.textContent = text;
    document.body.appendChild(el);
    gsap.fromTo(el, { opacity: 1, y: 0 }, {
      y: -60, opacity: 0, duration: 1, ease: 'power2.out',
      onComplete: () => el.remove(),
    });
  }

  function showComboPopup(text) {
    const el = document.createElement('div');
    el.className = 'combo-popup';
    el.style.color = '#B8926A';
    el.textContent = text;
    document.body.appendChild(el);
    gsap.fromTo(el, { scale: 0.3, opacity: 0 }, {
      scale: 1, opacity: 1, duration: 0.3, ease: 'back.out(2)',
      onComplete: () => {
        gsap.to(el, { opacity: 0, scale: 1.3, duration: 0.5, delay: 0.5, onComplete: () => el.remove() });
      }
    });
    // Gold screen flash
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:rgba(184,146,106,0.12);z-index:99;pointer-events:none;';
    document.body.appendChild(flash);
    gsap.to(flash, { opacity: 0, duration: 0.6, onComplete: () => flash.remove() });
  }

  function screenShake() {
    gsap.to(app, {
      keyframes: [
        { x: -2, duration: 0.04 }, { x: 2, duration: 0.04 },
        { x: -1, duration: 0.04 }, { x: 0, duration: 0.04 },
      ]
    });
  }

  /* ═══ GSAP TRANSITION ═══ */
  function transitionTo(renderFn) {
    const screen = app.querySelector('.screen');
    if (screen) {
      gsap.to(screen, {
        opacity: 0, y: -16, duration: 0.3, ease: 'power2.in',
        onComplete: () => { renderFn(); animateIn(); }
      });
    } else {
      renderFn();
      animateIn();
    }
  }

  function animateIn() {
    const screen = app.querySelector('.screen');
    if (!screen) return;
    gsap.fromTo(screen,
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }
    );
    const options = app.querySelectorAll('.option-btn');
    if (options.length) {
      gsap.fromTo(options,
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, stagger: 0.06, duration: 0.4, ease: 'power2.out', delay: 0.15 }
      );
    }
  }

  /* ═══ HEARTS HTML ═══ */
  function heartsHTML() {
    let h = '';
    for (let i = 0; i < 3; i++) {
      h += `<span class="heart" id="heart${i}" ${i >= state.lives ? 'style="filter:grayscale(1);opacity:0.25;"' : ''}>❤️</span>`;
    }
    return h;
  }

  /* ═══ HUD (top bar) ═══ */
  function hudHTML() {
    const mult = getMultiplier();
    return `
      <div class="w-full flex items-center justify-between mb-2 px-1">
        <div id="heartsRow">${heartsHTML()}</div>
        <div class="text-right">
          <span class="font-display font-bold text-2xl text-gold" id="scoreDisplay">${state.score}</span>
          ${mult > 1 ? `<span class="text-xs font-bold text-gold ml-1" id="multBadge">×${mult}</span>` : ''}
        </div>
      </div>
      <div class="w-full flex items-center justify-between mb-3 px-1">
        <span class="text-[0.6rem] font-semibold tracking-wide uppercase text-warmgray-light">
          Wave ${state.wave} · ${state.waveQ + 1}/${WAVE_SIZE}
        </span>
        <span class="text-sm" id="comboDisplay">
          ${state.combo >= 2 ? '🔥×' + state.combo : ''}
        </span>
      </div>
    `;
  }

  /* ═══ START SCREEN ═══ */
  function renderStart() {
    const hs = getHighScore();
    app.innerHTML = `
      <div class="screen flex flex-col items-center w-full">
        <div class="text-center mb-8">
          <p class="font-accent italic text-[0.65rem] tracking-[0.35em] text-gold opacity-50 mb-3">MMXXV</p>
          <h1 class="font-display text-[2.6rem] font-light tracking-wide leading-none text-ink">
            Word<br><em class="italic font-light text-warmgray">Street</em>
          </h1>
          <p class="text-[0.6rem] font-semibold tracking-[0.18em] uppercase text-warmgray-light mt-2">Vocabulary Atelier</p>
        </div>

        <div class="w-full bg-white rounded-2xl p-8 border border-subtle shadow-[0_2px_24px_rgba(0,0,0,0.03)]">
          ${hs > 0 ? `<div class="text-center mb-5"><span class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light">🏆 High Score</span><p class="font-display text-2xl font-bold text-gold">${hs}</p></div>` : ''}
          <div class="mb-6">
            <label class="block text-[0.6rem] font-semibold tracking-[0.15em] uppercase text-warmgray-light mb-2">Level</label>
            <select id="level" class="w-full px-5 py-4 rounded-xl text-sm font-medium border border-subtle bg-cream text-ink appearance-none cursor-pointer focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/10">
              <option value="1">Level Ⅰ — Beginner</option>
              <option value="2">Level Ⅱ — Elementary</option>
              <option value="3">Level Ⅲ — Intermediate</option>
              <option value="4">Level Ⅳ — Advanced</option>
              <option value="5">Level Ⅴ — Expert</option>
              <option value="all">All Levels</option>
            </select>
          </div>
          <div class="mb-8">
            <label class="block text-[0.6rem] font-semibold tracking-[0.15em] uppercase text-warmgray-light mb-2">Mode</label>
            <select id="mode" class="w-full px-5 py-4 rounded-xl text-sm font-medium border border-subtle bg-cream text-ink appearance-none cursor-pointer focus:outline-none focus:border-sage focus:ring-2 focus:ring-sage/10">
              <option value="definition">Definition Match</option>
              <option value="example">Fill in the Blank</option>
              <option value="image">Image Clue</option>
              <option value="reverse">Reverse Match</option>
            </select>
          </div>

          <div class="flex justify-center mb-8">
            <span class="text-gold/30 text-xs tracking-[0.5em]">· · ·</span>
          </div>

          <button id="startBtn" class="w-full py-4 rounded-xl text-sm font-semibold bg-sage text-white tracking-wide hover:bg-sage-light active:scale-[0.98] transition-all duration-300 shadow-[0_2px_12px_rgba(74,103,65,0.15)]">
            🎮 Start Game
          </button>
        </div>

        <p class="font-display italic text-xs text-gold/30 mt-5 tracking-wide">— est. for the curious mind —</p>
      </div>
    `;

    document.getElementById('startBtn').onclick = () => {
      state.level = document.getElementById('level').value;
      state.mode = document.getElementById('mode').value;
      state.lives = 3;
      state.score = 0;
      state.combo = 0;
      state.bestCombo = 0;
      state.wave = 1;
      state.waveQ = 0;
      state.pool = getPool(state.level);
      if (state.pool.length < 4) {
        alert('Not enough words in this level. Try "All Levels".');
        return;
      }
      state.questions = generateWaveQuestions();
      transitionTo(renderQuestion);
    };
  }

  /* ═══ QUESTION DATA ═══ */
  function getQuestionData(q) {
    const { word, distractors } = q;
    const m = state.mode;
    let prompt, correctAnswer, options;
    if (m === 'definition') {
      prompt = word.definition;
      correctAnswer = word.word;
      options = shuffle([word.word, ...distractors.map(d => d.word)]);
    } else if (m === 'example') {
      const re = new RegExp(word.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      prompt = word.example.replace(re, '______');
      correctAnswer = word.word;
      options = shuffle([word.word, ...distractors.map(d => d.word)]);
    } else if (m === 'image') {
      prompt = word.imageKeyword;
      correctAnswer = word.word;
      options = shuffle([word.word, ...distractors.map(d => d.word)]);
    } else {
      prompt = word.word;
      correctAnswer = word.definition;
      options = shuffle([word.definition, ...distractors.map(d => d.definition)]);
    }
    return { prompt, correctAnswer, options };
  }

  /* ═══ QUESTION SCREEN ═══ */
  function renderQuestion() {
    const q = state.questions[state.waveQ];
    const { prompt, correctAnswer, options } = getQuestionData(q);
    const modeLabels = {
      definition: 'What word matches this definition?',
      example: 'Complete the sentence',
      image: 'What word does this describe?',
      reverse: 'Choose the correct definition',
    };
    const pct = (state.waveQ / WAVE_SIZE) * 100;

    state.questionStartTime = Date.now();

    app.innerHTML = `
      <div class="screen w-full">
        <div class="w-full bg-white rounded-2xl p-6 pb-7 border border-subtle shadow-[0_2px_24px_rgba(0,0,0,0.03)]">
          ${hudHTML()}

          <!-- Wave progress bar -->
          <div class="w-full h-[3px] bg-black/[0.04] rounded-full mb-6 overflow-hidden">
            <div class="progress-fill h-full rounded-full bg-gradient-to-r from-sage to-gold" style="width:${pct}%"></div>
          </div>

          <!-- Mode label -->
          <p class="font-display italic text-sm text-gold/70 mb-3 tracking-wide">
            ${modeLabels[state.mode]}
          </p>

          <!-- Prompt -->
          <div class="flex items-start gap-2 mb-6 min-h-[48px]">
            <p class="text-base font-medium leading-relaxed text-ink flex-1">
              ${state.mode === 'example'
                ? prompt.replace('______', '<span class="inline-block bg-fog-pale rounded-md px-4 py-0.5 font-mono text-fog tracking-widest border-b-2 border-fog/30">______</span>')
                : (state.mode === 'reverse'
                  ? '<span class="font-mono font-medium text-lg tracking-wide">' + prompt + '</span>'
                  : prompt)}
            </p>
            <span id="pronounceSlot"></span>
          </div>

          <!-- Options -->
          <div class="flex flex-col gap-3" id="optionsContainer">
            ${options.map((o, idx) =>
              `<button class="option-btn w-full min-h-[54px] px-5 py-4 rounded-xl text-sm font-medium border border-subtle bg-white text-left leading-relaxed" data-answer="${encodeURIComponent(o)}" data-idx="${idx}">
                <span class="font-accent italic text-[0.7rem] text-gold/40 mr-3">${['a','b','c','d'][idx]}.</span>${o}
              </button>`
            ).join('')}
          </div>
        </div>
      </div>
    `;

    // Pronunciation button for reverse mode
    const pronounceSlot = document.getElementById('pronounceSlot');
    if (state.mode === 'reverse') {
      pronounceSlot.appendChild(WordStreetAudio.createPronounceBtn(q.word.word, { size: 'md' }));
    }

    const btns = app.querySelectorAll('.option-btn');
    btns.forEach(btn => {
      btn.onclick = () => {
        const answer = decodeURIComponent(btn.dataset.answer);
        const isCorrect = answer === correctAnswer;
        const elapsed = Date.now() - state.questionStartTime;
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        if (isCorrect) {
          // Combo
          state.combo++;
          if (state.combo > state.bestCombo) state.bestCombo = state.combo;
          const mult = getMultiplier();
          const points = BASE_POINTS * mult;
          const fast = elapsed < SPEED_THRESHOLD;
          const totalPts = points + (fast ? SPEED_BONUS : 0);
          state.score += totalPts;

          btn.classList.add('correct');
          gsap.fromTo(btn, { scale: 1 }, { scale: 1.03, duration: 0.2, yoyo: true, repeat: 1, ease: 'power2.inOut' });
          gsap.to(btn, { backgroundColor: 'rgba(74,103,65,0.06)', duration: 0.4 });

          // Particles burst
          burstParticles(cx, cy, shuffle(['#B8926A','#4A6741','#D4B896','#6B8A60'])[0], 10);

          // Float score text
          const label = mult > 1 ? `+${points}` : `+${BASE_POINTS}`;
          floatText(cx - 20, cy - 30, label, '#4A6741');

          // Speed bonus
          if (fast) {
            setTimeout(() => floatText(cx + 15, cy - 50, '⚡ FAST! +50', '#B8926A'), 200);
          }

          // Combo milestones
          if (state.combo === 3) showComboPopup('🔥 COMBO ×3!');
          else if (state.combo === 5) showComboPopup('🔥🔥 COMBO ×5!');
          else if (state.combo === 10) showComboPopup('🔥🔥🔥 COMBO ×10!');

          // Update score display
          const scoreEl = document.getElementById('scoreDisplay');
          gsap.fromTo(scoreEl, { scale: 1 }, { scale: 1.2, duration: 0.15, yoyo: true, repeat: 1 });
          scoreEl.textContent = state.score;

          // Update combo display
          const comboEl = document.getElementById('comboDisplay');
          if (state.combo >= 2) {
            comboEl.textContent = '🔥×' + state.combo;
            gsap.fromTo(comboEl, { scale: 1 }, { scale: 1.3, duration: 0.15, yoyo: true, repeat: 1 });
          }

          // Update multiplier badge
          const multBadge = document.getElementById('multBadge');
          if (mult > 1 && multBadge) {
            multBadge.textContent = '×' + mult;
            gsap.fromTo(multBadge, { scale: 1 }, { scale: 1.4, duration: 0.15, yoyo: true, repeat: 1 });
          }
        } else {
          // Wrong answer
          state.combo = 0;
          state.lives--;

          btn.classList.add('wrong');
          gsap.to(btn, {
            keyframes: [
              { x: -4, duration: 0.05 }, { x: 4, duration: 0.05 },
              { x: -3, duration: 0.05 }, { x: 0, duration: 0.1, ease: 'elastic.out(1,0.5)' },
            ]
          });
          gsap.to(btn, { backgroundColor: 'rgba(180,90,80,0.05)', duration: 0.4 });

          // Screen shake
          screenShake();

          // Heart break animation
          const heartEl = document.getElementById('heart' + state.lives);
          if (heartEl) {
            gsap.to(heartEl, {
              scale: 1.5, duration: 0.15, ease: 'power2.out',
              onComplete: () => {
                gsap.to(heartEl, {
                  scale: 0.8, opacity: 0.25, filter: 'grayscale(1)',
                  duration: 0.3, ease: 'power2.in',
                });
              }
            });
          }

          // Update combo display
          const comboEl = document.getElementById('comboDisplay');
          comboEl.textContent = '';

          // Reveal correct
          btns.forEach(b => {
            if (decodeURIComponent(b.dataset.answer) === correctAnswer) {
              b.classList.add('correct');
              gsap.to(b, { backgroundColor: 'rgba(74,103,65,0.06)', duration: 0.4 });
            }
          });
        }

        // Disable all options
        btns.forEach(b => {
          b.classList.add('disabled');
          if (!b.classList.contains('correct') && !b.classList.contains('wrong')) {
            gsap.to(b, { opacity: 0.2, scale: 0.97, duration: 0.35 });
          }
        });

        // Auto-play pronunciation
        if (state.mode !== 'reverse') {
          WordStreetAudio.playWord(q.word.word);
        }

        setTimeout(() => {
          // Check game over
          if (state.lives <= 0) {
            setHighScore(state.score);
            transitionTo(renderGameOver);
            return;
          }

          state.waveQ++;
          if (state.waveQ >= WAVE_SIZE) {
            // Wave complete
            transitionTo(renderWaveComplete);
          } else {
            transitionTo(renderQuestion);
          }
        }, isCorrect ? 700 : 1300);
      };
    });
  }

  /* ═══ WAVE COMPLETE SCREEN ═══ */
  function renderWaveComplete() {
    const waveNum = state.wave;
    app.innerHTML = `
      <div class="screen flex flex-col items-center w-full">
        <div class="w-full bg-white rounded-2xl p-8 border border-subtle shadow-[0_2px_24px_rgba(0,0,0,0.03)] text-center">
          <p class="text-4xl mb-3">🎉</p>
          <p class="font-display italic text-[2rem] font-light text-gold leading-none mb-4">Wave ${waveNum} Complete!</p>

          <div class="flex justify-center gap-6 mb-6">
            <div>
              <p class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light">Score</p>
              <p class="font-display text-2xl font-bold text-ink">${state.score}</p>
            </div>
            <div>
              <p class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light">Lives</p>
              <p class="text-2xl">${'❤️'.repeat(state.lives)}${'🖤'.repeat(3 - state.lives)}</p>
            </div>
            <div>
              <p class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light">Best Combo</p>
              <p class="font-display text-2xl font-bold text-gold">🔥${state.bestCombo}</p>
            </div>
          </div>

          <div class="flex justify-center mb-6">
            <span class="text-gold/30 text-xs tracking-[0.5em]">· · ·</span>
          </div>

          <button id="nextWaveBtn" class="w-full py-4 rounded-xl text-sm font-semibold bg-sage text-white tracking-wide hover:bg-sage-light active:scale-[0.98] transition-all duration-300 shadow-[0_2px_12px_rgba(74,103,65,0.15)]">
            ⚔️ Next Wave
          </button>
        </div>
      </div>
    `;

    document.getElementById('nextWaveBtn').onclick = () => {
      state.wave++;
      state.waveQ = 0;
      state.questions = generateWaveQuestions();
      transitionTo(renderQuestion);
    };
  }

  /* ═══ GAME OVER SCREEN ═══ */
  function renderGameOver() {
    const hs = getHighScore();
    const isNew = state.score >= hs;

    app.innerHTML = `
      <div class="screen flex flex-col items-center w-full">
        <div class="w-full bg-white rounded-2xl p-8 border border-subtle shadow-[0_2px_24px_rgba(0,0,0,0.03)] text-center">
          <p class="text-4xl mb-2">💀</p>
          <p class="font-display italic text-[2rem] font-light text-ink leading-none mb-2">Game Over</p>
          ${isNew ? '<p class="text-sm font-bold text-gold mb-3">🏆 NEW HIGH SCORE!</p>' : ''}

          <div class="flex justify-center mb-6">
            <span class="text-gold/30 text-xs tracking-[0.5em]">· · ·</span>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-cream rounded-xl p-4">
              <p class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light mb-1">Final Score</p>
              <p class="font-display text-3xl font-bold text-ink" id="finalScore">${state.score}</p>
            </div>
            <div class="bg-cream rounded-xl p-4">
              <p class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light mb-1">Waves</p>
              <p class="font-display text-3xl font-bold text-sage">${state.wave}</p>
            </div>
            <div class="bg-cream rounded-xl p-4">
              <p class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light mb-1">Best Combo</p>
              <p class="font-display text-3xl font-bold text-gold">🔥${state.bestCombo}</p>
            </div>
            <div class="bg-cream rounded-xl p-4">
              <p class="text-[0.6rem] font-semibold tracking-[0.12em] uppercase text-warmgray-light mb-1">High Score</p>
              <p class="font-display text-3xl font-bold text-gold">🏆${hs}</p>
            </div>
          </div>

          <button id="retryBtn" class="w-full py-4 rounded-xl text-sm font-semibold bg-sage text-white tracking-wide hover:bg-sage-light active:scale-[0.98] transition-all duration-300 shadow-[0_2px_12px_rgba(74,103,65,0.15)] mb-3">
            🔄 Try Again
          </button>
          <button id="homeBtn2" class="w-full py-3.5 rounded-xl text-sm font-medium text-ink border border-subtle hover:bg-black/[0.02] active:scale-[0.98] transition-all duration-300">
            Change Settings
          </button>
        </div>
      </div>
    `;

    // Animate final score
    const scoreEl = document.getElementById('finalScore');
    gsap.fromTo(scoreEl, { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.7, delay: 0.15, ease: 'back.out(1.5)' });

    document.getElementById('retryBtn').onclick = () => {
      state.lives = 3;
      state.score = 0;
      state.combo = 0;
      state.bestCombo = 0;
      state.wave = 1;
      state.waveQ = 0;
      state.questions = generateWaveQuestions();
      transitionTo(renderQuestion);
    };
    document.getElementById('homeBtn2').onclick = () => {
      transitionTo(renderStart);
    };
  }

  /* ═══ INIT ═══ */
  renderStart();
  animateIn();
})();
</script>
</body>
</html>
