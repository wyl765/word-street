<style>
  body { background: #FDFBF7; -webkit-font-smoothing: antialiased; }
  .option-btn { transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
  .option-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.correct { background: rgba(74,103,65,0.06); border-color: #4A6741; color: #4A6741; }
  .option-btn.wrong { background: rgba(180,90,80,0.05); border-color: #B45A50; color: #B45A50; }
  .option-btn.disabled { pointer-events: none; }
  .option-btn.disabled:not(.correct):not(.wrong) { opacity: 0.2; transform: scale(0.97); }
  .progress-fill { transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
  .screen { opacity: 0; }
  .heart { display: inline-block; font-size: 1.4rem; margin: 0 2px; transition: transform 0.3s; }
  @media (max-width: 639px) { body { font-size: 0.925rem; } .heart { font-size: 1.2rem; } }
  @media (min-width: 1024px) { body { font-size: 1.05rem; } }
  .heart.lost { filter: grayscale(1); opacity: 0.25; }
  .float-up { position: absolute; pointer-events: none; font-weight: 700; font-size: 1.1rem; z-index: 50; white-space: nowrap; }
  .particle { position: absolute; pointer-events: none; border-radius: 50%; z-index: 40; }
  .combo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 100; font-size: 2rem; font-weight: 800; text-shadow: 0 2px 12px rgba(184,146,106,0.4); }
  .xp-bar { height: 6px; border-radius: 3px; background: rgba(0,0,0,0.06); overflow: hidden; }
  .xp-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4A6741, #B8926A); transition: width 1s cubic-bezier(0.22, 1, 0.36, 1); }
  .achievement-toast { position: fixed; top: 20px; right: 20px; z-index: 200; background: white; border: 1px solid rgba(0,0,0,0.06); border-radius: 16px; padding: 16px 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; }
  .level-up-overlay { position: fixed; inset: 0; z-index: 150; display: flex; align-items: center; justify-content: center; background: rgba(253,251,247,0.92); backdrop-filter: blur(8px); }
  .daily-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; }
  .streak-fire { animation: pulse-fire 1s ease-in-out infinite alternate; }
  @keyframes pulse-fire { from { transform: scale(1); } to { transform: scale(1.15); } }
  .etym-prefix { color: #8E44AD; font-weight: 700; }
  .etym-root { color: #4A6741; font-weight: 700; }
  .etym-suffix { color: #B8926A; font-weight: 700; }
  .tab-btn { padding: 10px 16px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.3s; cursor: pointer; }
  .tab-btn.active { background: #4A6741; color: white; }
  .tab-btn:not(.active) { color: #6B6560; }
  .tab-btn:not(.active):hover { background: rgba(0,0,0,0.03); }
  /* Image card styles */
  .ws-image-card { position: relative; border-radius: 12px; overflow: hidden; background: linear-gradient(135deg, #F0E6D8 0%, #E8F0E6 100%); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .ws-image-card img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; transition: opacity 0.3s; }
  .ws-image-card .ws-image-keyword { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.1rem; font-style: italic; color: #6B6560; text-align: center; padding: 8px; z-index: 1; text-transform: capitalize; }
  .ws-image-card .ws-image-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .ws-image-card .ws-image-loading::after { content: ''; width: 20px; height: 20px; border: 2px solid rgba(184,146,106,0.3); border-top-color: #B8926A; border-radius: 50%; animation: ws-spin 0.8s linear infinite; }
  @keyframes ws-spin { to { transform: rotate(360deg); } }
  @media (max-width: 639px) { .ws-image-card { width: 120px; height: 90px; } .ws-image-card.ws-image-large { width: 240px; height: 180px; } }
  @media (min-width: 640px) { .ws-image-card { width: 160px; height: 120px; } .ws-image-card.ws-image-large { width: 320px; height: 240px; } }
  .ws-image-toggle { background: none; border: 1px solid rgba(184,146,106,0.2); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; color: rgba(184,146,106,0.6); transition: all 0.2s; flex-shrink: 0; }
  .ws-image-toggle:hover { background: rgba(184,146,106,0.08); color: #B8926A; }
  /* Mastery dots */
  .ws-mastery-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin: 0 1.5px; }
  .ws-mastery-dot.filled { background: #4A6741; }
  .ws-mastery-dot.empty { background: rgba(0,0,0,0.1); }
  /* Context mode */
  .ws-context-passage { background: #FDFBF7; border: 1px solid rgba(0,0,0,0.06); border-radius: 12px; padding: 16px; font-size: 0.9rem; line-height: 1.7; color: #2D2926; }
  .ws-context-blank { display: inline; background: linear-gradient(to bottom, transparent 60%, rgba(184,146,106,0.2) 60%); padding: 0 2px; font-weight: 600; letter-spacing: 0.05em; }
  /* Parent report */
  .ws-report-card { background: white; border: 1px solid rgba(0,0,0,0.06); border-radius: 16px; padding: 20px; box-shadow: 0 2px 24px rgba(0,0,0,0.03); }
  .ws-grade-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; }
</style>

<body class="min-h-screen flex items-center justify-center p-5 font-body text-ink">

<div id="app" class="w-full max-w-[100%] sm:max-w-[520px] lg:max-w-[480px] min-h-[560px] flex flex-col items-center px-4 sm:px-0"></div>

<script src="words-level2d.js"></script>
<script src="words-level3a.js"></script>
<script src="words-level3b.js"></script>
<script src="words-level3c.js"></script>
<script src="words-level4a.js"></script>
<script src="words-level4b.js"></script>
<script src="words-level4c.js"></script>
<script src="words-level5a.js"></script>
<script src="words-level5b.js"></script>
<script src="words-level5c.js"></script>
<script src="words-level5d.js"></script>
<script>
(function() {
  'use strict';
  const app = document.getElementById('app');
  const G = window.WordStreetGame;
  const SRS = window.WordStreetSRS;
  const ETY = window.WordStreetEtymology;
  const WAVE_SIZE = 10;
  const DAILY_SIZE = 10;
  const REVIEW_SIZE = 10;
  const SPEED_THRESHOLD = 3000;
  const SPEED_BONUS = 50;
  const BASE_POINTS = 100;
  const XP_PER_CORRECT = 15;
  const XP_COMBO_BONUS = 5;
  const XP_DAILY_BONUS = 50;
  const XP_SPEED_BONUS = 5;

  /* ═══ WORD BANKS ═══ */
  const allBanks = {
    1: [...(typeof LEVEL1_BANK!=='undefined'?LEVEL1_BANK:[])],
    2: [...(typeof LEVEL2_BANK!=='undefined'?LEVEL2_BANK:[]),...(typeof LEVEL2A_BANK!=='undefined'?LEVEL2A_BANK:[]),...(typeof LEVEL2B_BANK!=='undefined'?LEVEL2B_BANK:[]),...(typeof LEVEL2C_BANK!=='undefined'?LEVEL2C_BANK:[]),...(typeof LEVEL2D_BANK!=='undefined'?LEVEL2D_BANK:[])],
    3: [...(typeof LEVEL3A_BANK!=='undefined'?LEVEL3A_BANK:[]),...(typeof LEVEL3B_BANK!=='undefined'?LEVEL3B_BANK:[]),...(typeof LEVEL3C_BANK!=='undefined'?LEVEL3C_BANK:[])],
    4: [...(typeof LEVEL4A_BANK!=='undefined'?LEVEL4A_BANK:[]),...(typeof LEVEL4B_BANK!=='undefined'?LEVEL4B_BANK:[]),...(typeof LEVEL4C_BANK!=='undefined'?LEVEL4C_BANK:[])],
    5: [...(typeof LEVEL5A_BANK!=='undefined'?LEVEL5A_BANK:[]),...(typeof LEVEL5B_BANK!=='undefined'?LEVEL5B_BANK:[]),...(typeof LEVEL5C_BANK!=='undefined'?LEVEL5C_BANK:[]),...(typeof LEVEL5D_BANK!=='undefined'?LEVEL5D_BANK:[])],
  };

  function getPool(level) {
    if (level === 'all') return Object.values(allBanks).flat();
    return allBanks[level] || [];
  }
  function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function seededShuffle(arr, rng) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function pick(arr, n, exclude) { return shuffle(arr.filter(w=>w!==exclude)).slice(0,n); }

  /* ═══ IMAGE SYSTEM ═══ */
  const showImages = () => localStorage.getItem('wordstreet_showImages') !== 'false';
  function toggleImages() { localStorage.setItem('wordstreet_showImages', showImages() ? 'false' : 'true'); }
  function createImageCard(imageKeyword, large) {
    if (!showImages() || !imageKeyword) return '';
    const cls = large ? 'ws-image-card ws-image-large' : 'ws-image-card';
    const encodedKw = encodeURIComponent(imageKeyword);
    const imgUrl = `https://source.unsplash.com/400x300/?${encodedKw}`;
    return `<div class="${cls} mx-auto" id="imageCard">
      <span class="ws-image-keyword">${imageKeyword}</span>
      <div class="ws-image-loading" id="imageLoader"></div>
      <img src="${imgUrl}" alt="${imageKeyword}" id="imageEl" style="opacity:0" onload="this.style.opacity=1;var l=document.getElementById('imageLoader');if(l)l.style.display='none';" onerror="this.style.display='none';var l=document.getElementById('imageLoader');if(l)l.style.display='none';">
    </div>`;
  }

  /* ═══ ADAPTIVE DIFFICULTY ═══ */
  function loadWordStats() {
    try { return JSON.parse(localStorage.getItem('wordstreet_wordStats') || '{}'); } catch(e) { return {}; }
  }
  function saveWordStats(stats) { localStorage.setItem('wordstreet_wordStats', JSON.stringify(stats)); }
  function updateWordStat(word, correct) {
    const stats = loadWordStats();
    const key = word.toLowerCase();
    if (!stats[key]) stats[key] = { correct: 0, wrong: 0, lastSeen: 0 };
    if (correct) stats[key].correct++; else stats[key].wrong++;
    stats[key].lastSeen = Date.now();
    saveWordStats(stats);
  }
  function getWordWeight(word) {
    const stats = loadWordStats();
    const key = word.word.toLowerCase();
    const s = stats[key];
    if (!s) return 3; // never seen
    const total = s.correct + s.wrong;
    const rate = total > 0 ? s.correct / total : 0;
    const daysSince = (Date.now() - s.lastSeen) / (1000*60*60*24);
    if (daysSince > 7) return 2; // spaced repetition
    if (rate > 0.8 && total >= 3) return 0.5; // mastered
    if (rate < 0.5) return 5; // weak
    return 1; // normal
  }
  function isWordMastered(word) {
    const stats = loadWordStats();
    const s = stats[word.toLowerCase()];
    if (!s) return false;
    const total = s.correct + s.wrong;
    return s.correct >= 3 && total > 0 && (s.correct / total) > 0.8;
  }
  function getMasteryDots(word) {
    const stats = loadWordStats();
    const s = stats[word.toLowerCase()];
    if (!s) return { seen: 0, needed: 3 };
    return { seen: Math.min(s.correct, 3), needed: 3 };
  }
  function getMasteredCount(level) {
    const pool = getPool(level);
    const stats = loadWordStats();
    return pool.filter(w => {
      const s = stats[w.word.toLowerCase()];
      if (!s) return false;
      const total = s.correct + s.wrong;
      return s.correct >= 3 && total > 0 && (s.correct / total) > 0.8;
    }).length;
  }
  function weightedSelect(pool, count) {
    // Weighted random selection
    const weighted = pool.map(w => ({ word: w, weight: getWordWeight(w) }));
    const totalWeight = weighted.reduce((sum, w) => sum + w.weight, 0);
    if (totalWeight === 0) return shuffle(pool).slice(0, count);
    const selected = [];
    const available = [...weighted];
    for (let i = 0; i < count && available.length > 0; i++) {
      const tw = available.reduce((s, w) => s + w.weight, 0);
      let r = Math.random() * tw;
      let pick = available[0];
      for (const w of available) {
        r -= w.weight;
        if (r <= 0) { pick = w; break; }
      }
      selected.push(pick.word);
      const idx = available.indexOf(pick);
      if (idx >= 0) available.splice(idx, 1);
    }
    return selected;
  }
  function masteryDotsHTML(word) {
    const { seen, needed } = getMasteryDots(word);
    let html = '';
    for (let i = 0; i < needed; i++) html += `<span class="ws-mastery-dot ${i < seen ? 'filled' : 'empty'}"></span>`;
    return `<span class="ml-2" title="${seen}/${needed} to master">${html}</span>`;
  }

  /* ═══ STATE ═══ */
  let profile = G.loadProfile();
  let state = {
    level: '1', mode: 'definition',
    lives: 3, score: 0, combo: 0, bestCombo: 0,
    wave: 1, waveQ: 0,
    pool: [], questionStartTime: 0,
    isDaily: false, dailyCorrect: 0,
    isReview: false,
    wavePerfect: true,
    xpGained: 0,
  };

  function getMultiplier() {
    if (state.combo >= 10) return 5;
    if (state.combo >= 5) return 3;
    if (state.combo >= 3) return 2;
    return 1;
  }

  function generateWaveQuestions() {
    const pool = state.pool;
    if (pool.length < 4) return [];
    const selected = weightedSelect(pool, WAVE_SIZE);
    return selected.map(word => ({ word, distractors: pick(pool, 3, word) }));
  }

  function generateDailyQuestions() {
    const today = G.getTodayKey();
    const seed = G.hashString('wordstreet-daily-' + today);
    const rng = G.seededRandom(seed);
    const allWords = Object.values(allBanks).flat();
    const shuffled = seededShuffle(allWords, rng);
    const selected = shuffled.slice(0, DAILY_SIZE);
    return selected.map(word => {
      const others = shuffled.filter(w => w !== word).slice(0, 20);
      const distIdx = [Math.floor(rng()*others.length), Math.floor(rng()*others.length), Math.floor(rng()*others.length)];
      const distractors = [...new Set(distIdx)].slice(0,3).map(i => others[i] || others[0]);
      while (distractors.length < 3) distractors.push(others[distractors.length]);
      return { word, distractors };
    });
  }

  /* ═══ PARTICLES & EFFECTS ═══ */
  function burstParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = 4 + Math.random() * 6;
      el.style.cssText = `width:${size}px;height:${size}px;background:${color};left:${x}px;top:${y}px;`;
      document.body.appendChild(el);
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 40 + Math.random() * 60;
      gsap.to(el, { x: Math.cos(angle)*dist, y: Math.sin(angle)*dist, opacity:0, scale:0, duration: 0.6+Math.random()*0.3, ease:'power2.out', onComplete:()=>el.remove() });
    }
  }

  function floatText(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'float-up';
    el.style.cssText = `left:${x}px;top:${y}px;color:${color};`;
    el.textContent = text;
    document.body.appendChild(el);
    gsap.fromTo(el, { opacity:1, y:0 }, { y:-60, opacity:0, duration:1, ease:'power2.out', onComplete:()=>el.remove() });
  }

  function showComboPopup(text) {
    const el = document.createElement('div');
    el.className = 'combo-popup';
    el.style.color = '#B8926A';
    el.textContent = text;
    document.body.appendChild(el);
    gsap.fromTo(el, { scale:0.3, opacity:0 }, { scale:1, opacity:1, duration:0.3, ease:'back.out(2)', onComplete:()=>{
      gsap.to(el, { opacity:0, scale:1.3, duration:0.5, delay:0.5, onComplete:()=>el.remove() });
    }});
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:rgba(184,146,106,0.12);z-index:99;pointer-events:none;';
    document.body.appendChild(flash);
    gsap.to(flash, { opacity:0, duration:0.6, onComplete:()=>flash.remove() });
  }

  function screenShake() {
    gsap.to(app, { keyframes:[{x:-2,duration:0.04},{x:2,duration:0.04},{x:-1,duration:0.04},{x:0,duration:0.04}] });
  }

  function showAchievementToast(id) {
    const a = G.ACHIEVEMENTS[id];
    if (!a) return;
    const toast = document.createElement('div');
    toast.className = 'achievement-toast';
    toast.innerHTML = `<span style="font-size:1.8rem">${a.icon}</span><div><p style="font-weight:700;font-size:0.85rem;margin:0">Achievement Unlocked!</p><p style="font-size:0.75rem;color:#6B6560;margin:2px 0 0">${a.name}</p></div>`;
    document.body.appendChild(toast);
    gsap.fromTo(toast, { x:100, opacity:0 }, { x:0, opacity:1, duration:0.4, ease:'back.out(1.5)' });
    setTimeout(() => gsap.to(toast, { x:100, opacity:0, duration:0.3, onComplete:()=>toast.remove() }), 3000);
  }

  function showLevelUp(newLevel) {
    const overlay = document.createElement('div');
    overlay.className = 'level-up-overlay';
    overlay.innerHTML = `
      <div style="text-align:center">
        <p style="font-size:3rem;margin:0">🎊</p>
        <p style="font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:#2D2926;margin:8px 0">Level ${newLevel}!</p>
        <p style="font-size:0.8rem;color:#6B6560;margin:0">Keep going!</p>
      </div>
    `;
    document.body.appendChild(overlay);
    gsap.fromTo(overlay, { opacity:0 }, { opacity:1, duration:0.4 });
    setTimeout(() => gsap.to(overlay, { opacity:0, duration:0.4, onComplete:()=>overlay.remove() }), 2000);
  }

  /* ═══ XP GAIN ═══ */
  function gainXP(amount) {
    const oldLevel = profile.level;
    profile.xp += amount;
    state.xpGained += amount;
    const leveled = G.checkLevelUp(profile);
    G.saveProfile(profile);
    if (leveled && profile.level > oldLevel) {
      showLevelUp(profile.level);
    }
    // Check achievements after XP gain
    const newAch = G.checkAchievements(profile, { sessionScore: state.score, perfectWave: state.wavePerfect, waveCompleted: true, spellingPerfect: state.wavePerfect && state.mode === 'spelling', sessionWaves: state.wave });
    newAch.forEach(id => setTimeout(() => showAchievementToast(id), 500));
    G.saveProfile(profile);
  }

  /* ═══ TRANSITIONS ═══ */
  function transitionTo(renderFn) {
    if (window.WordStreetAudio) WordStreetAudio.stopSpeech();
    const screen = app.querySelector('.screen');
    if (screen) {
      gsap.to(screen, { opacity:0, y:-16, duration:0.3, ease:'power2.in', onComplete:()=>{ renderFn(); animateIn(); } });
    } else { renderFn(); animateIn(); }
  }

  function animateIn() {
    const screen = app.querySelector('.screen');
    if (!screen) return;
    gsap.fromTo(screen, { opacity:0, y:20 }, { opacity:1, y:0, duration:0.6, ease:'power2.out' });
    const options = app.querySelectorAll('.option-btn');
    if (options.length) gsap.fromTo(options, { opacity:0, y:10 }, { opacity:1, y:0, stagger:0.06, duration:0.4, ease:'power2.out', delay:0.15 });
  }

  /* ═══ XP BAR HTML ═══ */
  function xpBarHTML() {
    const { pct, xpInLevel, xpNeeded } = G.xpProgress(profile);
    return `
      <div class="w-full mb-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-[0.6rem] font-bold tracking-wide text-sage">LV.${profile.level}</span>
          <span class="text-[0.55rem] text-warmgray-light">${xpInLevel}/${xpNeeded} XP</span>
        </div>
        <div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }

  /* ═══ HEARTS HTML ═══ */
  function heartsHTML() {
    let h = '';

  /* ═══ QUESTION DATA ═══ */
  function getQuestionData(q) {
    const { word, distractors } = q;
    const m = state.mode;
    let prompt, correctAnswer, options;
    if (m === 'definition') {
      prompt = word.definition; correctAnswer = word.word;
      options = shuffle([word.word, ...distractors.map(d => d.word)]);
    } else if (m === 'example') {
      const re = new RegExp(word.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      prompt = word.example.replace(re, '______'); correctAnswer = word.word;
      options = shuffle([word.word, ...distractors.map(d => d.word)]);
    } else if (m === 'image') {
      prompt = word.imageKeyword; correctAnswer = word.word;
      options = shuffle([word.word, ...distractors.map(d => d.word)]);
    } else if (m === 'spelling') {
      prompt = word.definition; correctAnswer = word.word;
      options = []; // no multiple choice in spelling mode
    } else if (m === 'context') {
      // Context inference: generate a mini-passage with the word blanked out
      const sentence = word.example;
      const re = new RegExp(word.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      prompt = sentence.replace(re, '_____');
      correctAnswer = word.word;
      options = shuffle([word.word, ...distractors.map(d => d.word)]);
    } else {
      prompt = word.word; correctAnswer = word.definition;
      options = shuffle([word.definition, ...distractors.map(d => d.definition)]);
    }
    return { prompt, correctAnswer, options };
  }

            ${state.mode === 'spelling' ? `
              <div class="flex gap-2">
                <input type="text" id="spellingInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Type the word..." class="flex-1 px-5 py-4 rounded-xl text-sm font-medium border border-subtle bg-white focus:outline-none focus:border-sage focus:ring-1 focus:ring-sage/30 font-mono tracking-wide">
                <button id="replayBtn" class="px-4 py-3 rounded-xl border border-subtle bg-white text-gold hover:bg-gold-pale/30 active:scale-95 transition-all" title="Replay pronunciation">🔊</button>
              </div>
              <button id="spellingSubmit" class="w-full py-4 rounded-xl text-sm font-semibold bg-sage text-white tracking-wide hover:bg-sage-light active:scale-[0.98] transition-all duration-300 shadow-[0_2px_12px_rgba(74,103,65,0.15)]">Check ✓</button>
            ` : options.map((o, idx) => `<button class="option-btn w-full min-h-[54px] px-5 py-4 rounded-xl text-sm font-medium border border-subtle bg-white text-left leading-relaxed" data-answer="${encodeURIComponent(o)}" data-idx="${idx}"><span class="font-accent italic text-[0.7rem] text-gold/40 mr-3">${['a','b','c','d'][idx]}.</span>${o}</button>`).join('')}
          </div>
        </div>
      </div>
    `;

    // Pronunciation buttons
    const pronounceSlot = document.getElementById('pronounceSlot');
    if (state.mode === 'reverse') pronounceSlot.appendChild(WordStreetAudio.createPronounceBtn(q.word.word, { size: 'md' }));
    if (state.mode === 'definition' || state.mode === 'example' || state.mode === 'context') {
      const rawText = state.mode === 'example' || state.mode === 'context' ? q.word.example : q.word.definition;
      pronounceSlot.appendChild(WordStreetAudio.createSpeakBtn(rawText));
    }

    // Spelling mode: auto-play word, set up input handlers
    if (state.mode === 'spelling') {
      WordStreetAudio.playWord(q.word.word);
      const spellingInput = document.getElementById('spellingInput');
      const spellingSubmit = document.getElementById('spellingSubmit');
      const replayBtn = document.getElementById('replayBtn');
      spellingInput.focus();

      replayBtn.onclick = (e) => { e.preventDefault(); WordStreetAudio.playWord(q.word.word); };

      function handleSpellingSubmit() {
        const userAnswer = spellingInput.value.trim().toLowerCase();
        if (!userAnswer) return;
        const isCorrect = userAnswer === correctAnswer.toLowerCase();
        const elapsed = Date.now() - state.questionStartTime;
        const rect = spellingSubmit.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        spellingInput.disabled = true;
        spellingSubmit.disabled = true;
        replayBtn.disabled = true;

        if (isCorrect) {
          spellingInput.style.borderColor = '#4A6741';
          spellingInput.style.backgroundColor = 'rgba(74,103,65,0.06)';
          spellingInput.style.color = '#4A6741';

          state.combo++;
          if (state.combo > state.bestCombo) state.bestCombo = state.combo;
          if (state.combo > profile.bestCombo) profile.bestCombo = state.combo;
          const mult = getMultiplier();
          const points = BASE_POINTS * mult;
          const fast = elapsed < SPEED_THRESHOLD;
          state.score += points + (fast ? SPEED_BONUS : 0);
          if (state.isDaily) state.dailyCorrect++;

          let xp = XP_PER_CORRECT;
          if (state.combo >= 3) xp += XP_COMBO_BONUS;
          if (fast) { xp += XP_SPEED_BONUS; profile.fastAnswers++; } else { profile.fastAnswers = 0; }
          profile.totalCorrect++;
          profile.totalAnswered++;
          const srsData = SRS.loadSRS();
          const wordKey = q.word.word.toLowerCase();
          srsData[wordKey] = SRS.sm2(srsData[wordKey], fast ? 5 : 4);
          SRS.saveSRS(srsData);
          updateWordStat(q.word.word, true);
          gainXP(xp);

          gsap.fromTo(spellingInput, {scale:1}, {scale:1.03, duration:0.2, yoyo:true, repeat:1, ease:'power2.inOut'});
          burstParticles(cx, cy, shuffle(['#B8926A','#4A6741','#D4B896','#6B8A60'])[0], 10);
          floatText(cx-20, cy-30, `+${points}`, '#4A6741');
          if (fast) setTimeout(()=>floatText(cx+15, cy-50, '⚡+50', '#B8926A'), 200);
          if (state.combo === 3) showComboPopup('🔥 ×3!');
          else if (state.combo === 5) showComboPopup('🔥🔥 ×5!');
          else if (state.combo === 10) showComboPopup('💥 ×10!');

          const scoreEl = document.getElementById('scoreDisplay');
          gsap.fromTo(scoreEl, {scale:1}, {scale:1.2, duration:0.15, yoyo:true, repeat:1});
          scoreEl.textContent = state.score;
          const comboEl = document.getElementById('comboDisplay');
          if (state.combo >= 2) { comboEl.textContent = '🔥×'+state.combo; gsap.fromTo(comboEl, {scale:1}, {scale:1.3, duration:0.15, yoyo:true, repeat:1}); }
        } else {
          spellingInput.style.borderColor = '#B45A50';
          spellingInput.style.backgroundColor = 'rgba(180,90,80,0.05)';
          spellingInput.style.color = '#B45A50';
          spellingInput.style.textDecoration = 'line-through';

          // Show correct spelling below
          const correctEl = document.createElement('div');
          correctEl.className = 'mt-2 px-5 py-3 rounded-xl bg-sage-pale border border-sage/20 text-center';
          correctEl.innerHTML = `<span class="text-[0.6rem] font-semibold tracking-wide uppercase text-sage/60">Correct spelling:</span><br><span class="font-mono font-bold text-lg text-sage tracking-wide">${correctAnswer}</span>`;
          document.getElementById('optionsContainer').appendChild(correctEl);
          gsap.fromTo(correctEl, {opacity:0, y:8}, {opacity:1, y:0, duration:0.3});

          state.combo = 0;
          state.lives--;
          state.wavePerfect = false;
          profile.fastAnswers = 0;
          profile.totalAnswered++;
          const srsDataW = SRS.loadSRS();
          const wordKeyW = q.word.word.toLowerCase();
          srsDataW[wordKeyW] = SRS.sm2(srsDataW[wordKeyW], 1);
          SRS.saveSRS(srsDataW);
          SRS.recordMistake(q.word.word, userAnswer, correctAnswer, state.mode);
          updateWordStat(q.word.word, false);
          G.saveProfile(profile);

          gsap.to(spellingInput, { keyframes:[{x:-4,duration:0.05},{x:4,duration:0.05},{x:-3,duration:0.05},{x:0,duration:0.1,ease:'elastic.out(1,0.5)'}] });
          screenShake();
          const heartEl = document.getElementById('heart'+state.lives);
          if (heartEl) gsap.to(heartEl, { scale:1.5, duration:0.15, ease:'power2.out', onComplete:()=>gsap.to(heartEl, { scale:0.8, opacity:0.25, filter:'grayscale(1)', duration:0.3 }) });
          document.getElementById('comboDisplay').textContent = '';
        }

        // Audio
        WordStreetAudio.stopSpeech();
        WordStreetAudio.playWordDetail(q.word);

        // Etymology hint
        const etymHint = ETY.getHint(q.word.word);
        if (etymHint) {

          etymEl.className = 'mt-3 p-3 rounded-lg bg-fog-pale/50 border border-fog/10';

          document.getElementById('optionsContainer').after(etymEl);
          gsap.fromTo(etymEl, {opacity:0, y:8}, {opacity:1, y:0, duration:0.4, delay:0.5});
        }

        setTimeout(() => {
          if (state.lives <= 0) {
            const hs = parseInt(localStorage.getItem('wordstreet_highscore')||'0',10);
            if (state.score > hs) localStorage.setItem('wordstreet_highscore', String(state.score));
            if (state.isDaily) finishDaily();
            transitionTo(renderGameOver);
            return;
          }
          state.waveQ++;
          const total = state.isDaily ? DAILY_SIZE : (state.isReview ? state.questions.length : WAVE_SIZE);
          if (state.waveQ >= total) {
            if (state.isDaily) { finishDaily(); transitionTo(renderDailyComplete); }
            else if (state.isReview) transitionTo(renderReviewComplete);
            else transitionTo(renderWaveComplete);
          } else transitionTo(renderQuestion);
        }, isCorrect ? 3500 : 4500);
      }

      spellingSubmit.onclick = handleSpellingSubmit;
      spellingInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSpellingSubmit(); });
      return; // skip multiple-choice handler setup
    }

    const btns = app.querySelectorAll('.option-btn');
    btns.forEach(btn => {
      btn.onclick = () => {
        const answer = decodeURIComponent(btn.dataset.answer);
        const isCorrect = answer === correctAnswer;
        const elapsed = Date.now() - state.questionStartTime;
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        if (isCorrect) {
          state.combo++;
          if (state.combo > state.bestCombo) state.bestCombo = state.combo;
          if (state.combo > profile.bestCombo) profile.bestCombo = state.combo;
          const mult = getMultiplier();
          const points = BASE_POINTS * mult;
          const fast = elapsed < SPEED_THRESHOLD;
          state.score += points + (fast ? SPEED_BONUS : 0);
          if (state.isDaily) state.dailyCorrect++;

          // XP
          let xp = XP_PER_CORRECT;
          if (state.combo >= 3) xp += XP_COMBO_BONUS;
          if (fast) { xp += XP_SPEED_BONUS; profile.fastAnswers++; } else { profile.fastAnswers = 0; }
          profile.totalCorrect++;
          profile.totalAnswered++;
          // SRS: record success
          const srsData = SRS.loadSRS();
          const wordKey = q.word.word.toLowerCase();
          srsData[wordKey] = SRS.sm2(srsData[wordKey], fast ? 5 : 4);
          SRS.saveSRS(srsData);
          updateWordStat(q.word.word, true);
          gainXP(xp);

          btn.classList.add('correct');
          gsap.fromTo(btn, {scale:1}, {scale:1.03, duration:0.2, yoyo:true, repeat:1, ease:'power2.inOut'});
          burstParticles(cx, cy, shuffle(['#B8926A','#4A6741','#D4B896','#6B8A60'])[0], 10);
          floatText(cx-20, cy-30, `+${points}`, '#4A6741');
          if (fast) setTimeout(()=>floatText(cx+15, cy-50, '⚡+50', '#B8926A'), 200);
          if (state.combo === 3) showComboPopup('🔥 ×3!');
          else if (state.combo === 5) showComboPopup('🔥🔥 ×5!');
          else if (state.combo === 10) showComboPopup('💥 ×10!');
          else if (state.combo === 20) showComboPopup('⚡ ×20!');

          const scoreEl = document.getElementById('scoreDisplay');
          gsap.fromTo(scoreEl, {scale:1}, {scale:1.2, duration:0.15, yoyo:true, repeat:1});
          scoreEl.textContent = state.score;
          const comboEl = document.getElementById('comboDisplay');
          if (state.combo >= 2) { comboEl.textContent = '🔥×'+state.combo; gsap.fromTo(comboEl, {scale:1}, {scale:1.3, duration:0.15, yoyo:true, repeat:1}); }
        } else {
          state.combo = 0;
          state.lives--;
          state.wavePerfect = false;
          profile.fastAnswers = 0;
          profile.totalAnswered++;
          // SRS: record failure
          const srsDataW = SRS.loadSRS();
          const wordKeyW = q.word.word.toLowerCase();
          srsDataW[wordKeyW] = SRS.sm2(srsDataW[wordKeyW], 1);
          SRS.saveSRS(srsDataW);
          SRS.recordMistake(q.word.word, answer, correctAnswer, state.mode);
          updateWordStat(q.word.word, false);
          G.saveProfile(profile);

          btn.classList.add('wrong');
          gsap.to(btn, { keyframes:[{x:-4,duration:0.05},{x:4,duration:0.05},{x:-3,duration:0.05},{x:0,duration:0.1,ease:'elastic.out(1,0.5)'}] });
          screenShake();
          const heartEl = document.getElementById('heart'+state.lives);
          if (heartEl) gsap.to(heartEl, { scale:1.5, duration:0.15, ease:'power2.out', onComplete:()=>gsap.to(heartEl, { scale:0.8, opacity:0.25, filter:'grayscale(1)', duration:0.3 }) });
          document.getElementById('comboDisplay').textContent = '';
          btns.forEach(b => { if (decodeURIComponent(b.dataset.answer)===correctAnswer) { b.classList.add('correct'); gsap.to(b, {backgroundColor:'rgba(74,103,65,0.06)', duration:0.4}); } });
        }

        btns.forEach(b => { b.classList.add('disabled'); if (!b.classList.contains('correct') && !b.classList.contains('wrong')) gsap.to(b, {opacity:0.2, scale:0.97, duration:0.35}); });

        // Audio
        WordStreetAudio.stopSpeech();
        if (state.mode !== 'reverse') WordStreetAudio.playWordDetail(q.word);
        else WordStreetAudio.speakText(q.word.definition, {rate:0.85}).then(()=>new Promise(r=>setTimeout(r,400))).then(()=>WordStreetAudio.speakText(q.word.example, {rate:0.85}));

        // Show etymology hint after answer
        const etymHint = ETY.getHint(q.word.word);
        if (etymHint) {
          const etymEl = document.createElement('div');
          etymEl.className = 'mt-3 p-3 rounded-lg bg-fog-pale/50 border border-fog/10';
          etymEl.innerHTML = `<p class="text-[0.6rem] font-semibold tracking-wide uppercase text-fog mb-1">🌳 Word Roots</p><p class="text-xs text-ink/70">${etymHint}</p>`;
          document.getElementById('optionsContainer').after(etymEl);
          gsap.fromTo(etymEl, {opacity:0, y:8}, {opacity:1, y:0, duration:0.4, delay:0.5});
        }

        setTimeout(() => {
          if (state.lives <= 0) {
            const hs = parseInt(localStorage.getItem('wordstreet_highscore')||'0',10);
            if (state.score > hs) localStorage.setItem('wordstreet_highscore', String(state.score));
            if (state.isDaily) finishDaily();
            transitionTo(renderGameOver);
            return;
          }
          state.waveQ++;
          const total = state.isDaily ? DAILY_SIZE : (state.isReview ? state.questions.length : WAVE_SIZE);
          if (state.waveQ >= total) {
            if (state.isDaily) { finishDaily(); transitionTo(renderDailyComplete); }
            else if (state.isReview) transitionTo(renderReviewComplete);
            else transitionTo(renderWaveComplete);
          } else transitionTo(renderQuestion);
        }, isCorrect ? 3500 : 4500);
      };
    });
  }

  /* ═══ DAILY FINISH ═══ */
  function finishDaily() {
    const today = G.getTodayKey();
    const prevDaily = G.loadDaily();
    // Check streak
    if (prevDaily && prevDaily.date) {
      const prev = new Date(prevDaily.date);
      const now = new Date(today);
      const diff = (now - prev) / (1000*60*60*24);
      if (diff === 1) profile.streak++;
      else if (diff > 1) profile.streak = 1;
    } else {
      profile.streak = 1;
    }
    profile.dailiesCompleted++;
    gainXP(XP_DAILY_BONUS);
    G.saveDaily({ date: today, completed: true, score: state.score, correct: state.dailyCorrect });
    G.saveProfile(profile);
  }

            ${levelStats.map(ls => `
              <div class="flex items-center gap-3 py-2 border-b border-subtle last:border-0">
                <span class="text-xs font-semibold w-16">Gr. ${ls.grade}</span>
                <div class="flex-1">
                  <div class="xp-bar"><div class="xp-fill" style="width:${ls.total > 0 ? Math.round(ls.mastered/ls.total*100) : 0}%"></div></div>
                </div>
                <span class="text-xs text-warmgray w-20 text-right">${ls.mastered}/${ls.total}</span>
                <span class="text-xs font-semibold ${ls.accuracy >= 70 ? 'text-sage' : ls.accuracy >= 40 ? 'text-gold' : 'text-ruby'} w-10 text-right">${ls.accuracy}%</span>
              </div>
            `).join('')}
          </div>

          <!-- Weak Areas -->
          ${weakWords.length > 0 ? `
          <div class="mb-4">
            <p class="text-[0.6rem] font-semibold tracking-[0.15em] uppercase text-warmgray-light mb-2">⚠️ Needs Practice</p>
            <div class="flex flex-wrap gap-1.5">
              ${weakWords.map(w => `<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-gold-pale text-gold">${w.word}</span>`).join('')}
            </div>
          </div>` : ''}

          <!-- Recommendation -->
          <div class="bg-sage-pale/50 rounded-xl p-4 mb-4">
            <p class="text-[0.6rem] font-semibold tracking-[0.15em] uppercase text-sage mb-2">💡 Recommendation</p>
            <p class="text-xs text-ink/70 leading-relaxed">
              ${totalMastered < 100
                ? 'Just getting started! Encourage 10 minutes of practice daily. Focus on Level 1 (Grades K-1) words first.'
                : totalMastered < 500
                  ? 'Good progress! Keep up the daily practice. Try the Spelling mode to strengthen word retention.'
                  : totalMastered < 1500
                    ? 'Strong vocabulary foundation! Consider moving to higher level words and using Context Clue mode for deeper understanding.'
                    : 'Excellent! Your child\'s vocabulary is growing fast. Challenge them with Level 4-5 words and the daily challenge for consistency.'}
            </p>
          </div>

          <button id="backBtn" class="w-full py-3.5 rounded-xl text-sm font-medium text-ink border border-subtle hover:bg-black/[0.02] active:scale-[0.98] transition-all duration-300">
            ← Back
          </button>
        </div>
      </div>
    `;
    document.getElementById('backBtn').onclick = () => transitionTo(renderStart);
  }

  /* ═══ INIT ═══ */
  renderStart();
  animateIn();
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update().catch(()=>{});
    if (reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    reg.addEventListener('updatefound', ()=>{
      const nw=reg.installing;
      if(nw) nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller) nw.postMessage({type:'SKIP_WAITING'});});
    });
  }).catch(()=>{});
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{if(!refreshing){refreshing=true;location.reload();}});
}
</script>
</body>
</html>
